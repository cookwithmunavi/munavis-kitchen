<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Fresh & Simple</title>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* 🌿 CLEAN PESTO & CREAM PALETTE */
        :root {
            --bg-cream: #FDFCF8;      /* Warm kitchen white, NO BLUE */
            --pesto-dark: #2E5A2F;    /* Deep green for text */
            --basil-pop: #8BC34A;     /* Bright green for buttons */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-cream); color: var(--pesto-dark); }

        /* 🧼 HIGH-VISIBILITY NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: var(--white); /* Solid white for maximum visibility */
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); /* Soft shadow to separate from food */
            border-bottom: 2px solid var(--basil-pop);
        }

        .logo { font-size: 22px; font-weight: 800; }
        .logo .brand-pop { color: var(--basil-pop); }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: var(--pesto-dark); /* Dark green for clarity */
            font-weight: 700;
            font-size: 15px;
        }

        /* 🥗 CRISP HERO */
        .hero {
            position: relative;
            height: 80vh;
            margin-top: 60px; /* Space for navbar */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* 💎 CRYSTAL GLASS BOX */
        .glass-panel {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.85); /* Bright white glass */
            backdrop-filter: blur(12px);
            padding: 40px 60px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .main-text { font-size: 3rem; font-weight: 800; display: block; color: var(--pesto-dark); }
        .sub-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; display: block; color: var(--pesto-dark); margin-top: 10px; opacity: 0.8; }

        .explore-btn {
            background: var(--basil-pop);
            color: var(--white);
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 25px;
            transition: 0.3s;
        }

        .explore-btn:hover { background: var(--pesto-dark); transform: scale(1.05); }

        .section { padding: 60px 20px; text-align: center; }
        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card h3 { padding: 15px; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CookWith<span class="brand-pop">Munavi</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <header class="hero">
        <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png" alt="Food Photo">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="location.href='recipes/dals/palak-dal.html'">
                <img src="images/palak-dal.jpeg">
                <h3>Palak Dal</h3>
            </div>
            <div class="card"><img src="https://unsplash.com"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

</body>
</html>
