<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Master Edition</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bright-orange: #FF9800; 
            --lime-green: #68A306;    
            --pure-white: #ffffff;
            --warm-bg: #FAF9F2;
        }

        /* Removed standard CSS scroll-behavior to let JS handle the custom speed */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--pure-white); 
            color: #333; 
            overflow-x: hidden;
            line-height: 1.3;
        }

        /* 🧼 LOGO SECTION */
        .navbar {
            padding: 25px 6% 0;
            width: 100%; 
            position: absolute;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.15rem; 
            font-weight: 900; 
            color: var(--lime-green); 
            text-decoration: none;
            display: inline-block;
        }
        .logo span { font-weight: 700; font-style: italic; color: var(--bright-orange); margin-left: 2px;}

        .logo-line {
            width: 60px; height: 3px; border-radius: 50px;
            background: linear-gradient(to right, var(--lime-green), var(--bright-orange));
            margin-top: 4px;
        }

        /* 🥘 HERO SECTION */
        .hero { 
            display: flex; 
            flex-direction: row; 
            height: 380px; 
            width: 100%;
            align-items: center;
            overflow: hidden;
        }

        .hero-text { 
            flex: 1.1; 
            padding-left: 6%; 
            padding-right: 5px; 
            margin-top: 40px;
            z-index: 10;
        }

        .hero-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.2rem; 
            font-weight: 900;
            color: var(--lime-green); 
            margin-bottom: 8px; 
            line-height: 1.1;
        }
        .hero-title span { font-style: italic; font-weight: 700; color: var(--bright-orange); }

        .hero-subtitle { 
            font-size: 0.65rem; 
            color: #666; 
            margin-bottom: 15px; 
            max-width: 130px;
        }

        /* ACTION BUTTON */
        .btn-main {
            background: var(--bright-orange); 
            color: white; 
            padding: 8px 18px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 800; 
            display: inline-block; 
            text-transform: uppercase; 
            font-size: 0.55rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-main:hover { transform: scale(1.08); background: #f57c00; }

        .hero-visual { 
            flex: 1.6; 
            height: 100%; 
            background: var(--lime-green); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 15% 100%, 0% 50%);
        }

        .circle-frame {
            width: 150px; 
            height: 150px;
            background: white;
            border-radius: 50%; 
            overflow: hidden; 
            border: 4px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .circle-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 💻 DESKTOP RESTORE */
        @media (min-width: 992px) {
            .navbar { padding: 40px 8%; }
            .logo { font-size: 1.6rem; }
            .logo-line { width: 100px; height: 5px; }
            .hero { height: 100vh; }
            .hero-text { flex: 1; padding-left: 8%; margin-top: 0; }
            .hero-title { font-size: 4rem; margin-bottom: 20px; }
            .hero-subtitle { font-size: 1.1rem; max-width: 450px; margin-bottom: 40px; }
            .btn-main { padding: 18px 45px; font-size: 12px; }
            .hero-visual { flex: 1.3; }
            .circle-frame { width: 500px; height: 500px; border-width: 15px; }
        }

        /* 🥗 RECIPES SECTION */
        .recipes { padding: 80px 6%; background: var(--warm-bg); text-align: center; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--lime-green); margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }

        /* ✨ INTERACTIVE CARD FIX */
        .card { 
            background: white; 
            border-radius: 24px; 
            padding: 20px; 
            text-decoration: none; 
            color: inherit; 
            display: block; 
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 2px solid transparent;
        }

        /* 💥 THE "SELECTION POP" COLOR */
        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 25px 50px rgba(255, 152, 0, 0.15); /* Orange selection glow */
            border-color: var(--bright-orange);
        }
        
        .card-img { 
            width: 100%; height: 220px; border-radius: 14px; 
            overflow: hidden; margin-bottom: 15px; 
            transition: transform 0.6s ease;
        }
        .card:hover .card-img img { transform: scale(1.1); }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }

        .card h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--lime-green); transition: color 0.3s; }
        .card:hover h3 { color: var(--bright-orange); } /* Text pops to orange on hover */

        /* 🔝 SCROLL TO TOP */
        .scroll-top { position: fixed; bottom: 25px; right: 25px; width: 45px; height: 45px; background: var(--lime-green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 20px; z-index: 1000; box-shadow: 0 5px 10px rgba(0,0,0,0.1); cursor: pointer; border: none; }

        footer { padding: 80px 8% 40px; text-align: center; border-top: 1px solid #eee; background: #fff; }
    </style>
</head>
<body>

    <nav id="top" class="navbar">
        <a href="#" class="logo">CookWith<span>Munavi</span><div class="logo-line"></div></a>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1 class="hero-title">Taste the <span>Joy</span> of Home Cooking.</h1>
            <p class="hero-subtitle">Elevated, beginner-friendly recipes designed for incredible results.</p>
            <!-- Custom JS Trigger -->
            <button onclick="slowScroll('recipes')" class="btn-main">Explore Recipes</button>
        </div>

        <div class="hero-visual">
            <div class="circle-frame">
                <img src="images/biryani.png" alt="Munavi Signature Biryani">
            </div>
        </div>
    </header>

    <section class="recipes" id="recipes">
        <h2 class="section-title">Discover the Recipes</h2>
        <div class="grid">
            <a href="recipes/dals/palak-dal.html" class="card">
                <div class="card-img"><img src="images/palak-dal.jpeg" alt="Palak Dal"></div>
                <h3>Aromatic Palak Dal</h3>
                <p style="color:#999; font-size:12px; font-weight:700; text-transform:uppercase; margin-top:8px; letter-spacing:1px;">20 Mins • Simple • Healthy</p>
            </a>
            <div class="card" style="opacity: 0.4;"><div class="card-img" style="background: #f8f8f8;"></div><h3>Future Creation</h3></div>
        </div>
    </section>

    <!-- JS Back to top -->
    <button onclick="slowScroll('top')" class="scroll-top">↑</button>

    <footer>
        <div class="logo" style="font-size: 1.4rem;">CookWith<span>Munavi</span></div>
        <p style="font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 2px; margin-top: 15px;">© 2026 The Modern Kitchen | Built for Bold Beginners</p>
    </footer>

    <!-- 🪄 VELVET SMOOTH SCROLL SCRIPT -->
    <script>
        function slowScroll(targetId) {
            const target = document.getElementById(targetId);
            const targetPosition = target.getBoundingClientRect().top + window.pageYOffset;
            const startPosition = window.pageYOffset;
            const distance = targetPosition - startPosition;
            const duration = 1200; // Time in milliseconds (1.2 seconds) - adjust this to make it slower/faster
            let startTime = null;

            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const run = easeInOut(timeElapsed, startPosition, distance, duration);
                window.scrollTo(0, run);
                if (timeElapsed < duration) requestAnimationFrame(animation);
            }

            // Easing function for that "gentle glide" feel
            function easeInOut(t, b, c, d) {
                t /= d / 2;
                if (t < 1) return c / 2 * t * t + b;
                t--;
                return -c / 2 * (t * (t - 2) - 1) + b;
            }

            requestAnimationFrame(animation);
        }
    </script>

</body>
</html>
