<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | The Blue Collection</title>

    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* 🌊 ALL-BLUE EXPERT PALETTE */
        :root {
            --navy-brand: #000066;    /* Your chosen Navy */
            --sky-pop: #00B4FF;       /* Vibrant Sky Blue for "Munavi" & Hovers */
            --ice-bg: #F4F9FF;        /* Subtle blue-tinted white for sections */
            --white: #ffffff;
            --text-dark: #001133;     /* Almost black navy for readability */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--white); color: var(--text-dark); scroll-behavior: smooth; }

        /* 🧼 EXPERT BLUE NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: var(--navy-brand);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--sky-pop); /* Blue accent line */
            box-shadow: 0 4px 20px rgba(0, 0, 102, 0.2);
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo .white { color: var(--white); }
        .logo .blue-pop { 
            color: var(--sky-pop); 
            text-shadow: 0 0 15px rgba(0, 180, 255, 0.4); 
        }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            transition: 0.3s ease;
            position: relative;
        }

        /* Expert Hover: Text turns Sky Blue and grows a glow */
        .nav-links a:hover {
            color: var(--sky-pop);
            text-shadow: 0 0 10px rgba(0, 180, 255, 0.3);
        }

        /* 🥗 HERO SECTION */
        .hero {
            margin-top: 65px; height: 75vh;
            background: var(--navy-brand);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        .hero img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }

        .glass-panel {
            position: relative; z-index: 3;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 55px 75px; border-radius: 24px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 102, 0.15);
        }

        .main-text { font-size: 3.2rem; font-weight: 800; color: var(--navy-brand); line-height: 1.1; }
        .sub-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: #556688; margin-top: 8px; display: block; }

        .explore-btn {
            background: var(--navy-brand);
            color: var(--white);
            padding: 18px 45px; border-radius: 8px;
            text-decoration: none; font-weight: 800; display: inline-block;
            margin-top: 30px; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .explore-btn:hover {
            background: var(--sky-pop);
            color: var(--navy-brand);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 180, 255, 0.3);
        }

        /* 🖼️ RECIPE GRID: Fresh Ice Blue Background */
        .section { padding: 100px 20px; text-align: center; background: var(--ice-bg); }
        .section h2 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 60px; color: var(--navy-brand); }

        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }

        .card {
            background: var(--white); border-radius: 20px; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 25px rgba(0, 0, 102, 0.05);
            cursor: pointer; border: 1px solid rgba(0, 0, 102, 0.03);
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0, 180, 255, 0.15);
            border-color: var(--sky-pop);
        }

        .card img { width: 100%; height: 250px; object-fit: cover; transition: 0.6s ease; }
        .card:hover img { transform: scale(1.1); }
        .card h3 { padding: 25px; font-weight: 800; font-size: 24px; color: var(--navy-brand); transition: 0.3s; }
        .card:hover h3 { color: var(--sky-pop); }

        .footer { padding: 60px; text-align: center; background: var(--navy-brand); color: var(--white); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="white">CookWith</span><span class="blue-pop">Munavi</span>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <header class="hero">
        <img src="https://unsplash.com">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal" onerror="this.src='https://placehold.jp'">
                <h3>Palak Dal</h3>
            </div>
            <div class="card">
                <img src="https://unsplash.com">
                <h3>Masala Dosa</h3>
            </div>
            <div class="card">
                <img src="https://unsplash.com">
                <h3>Chicken Biryani</h3>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 CookWithMunavi | Fresh • Healthy • Easy</p>
    </footer>

</body>
</html>
