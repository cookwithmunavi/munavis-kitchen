<!DOCTYPE html>
<html>
<head>
  <title>CookWithMunavi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #1a120d;
      color: #eee;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: #1a120d;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 200, 120, 0.2);
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .logo span {
      color: #f5a623;
    }

    .nav-links a {
      margin-left: 15px;
      text-decoration: none;
      color: #d4a373;
      font-size: 14px;
    }

    .nav-links a:hover {
      color: #f5a623;
    }

    /* HERO */
    .hero {
      margin-top: 60px;
      height: 70vh;
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.6)),
        url("images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png") center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content h1 {
      font-size: 32px;
      color: white;
      margin-bottom: 10px;
    }

    .hero-content p {
      color: #d4a373;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .explore-btn {
      background: linear-gradient(90deg,#f5a623,#ffcc80);
      color: #1a120d;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }

    /* SECTION */
    .section {
      text-align: center;
      margin-top: 30px;
      padding: 0 10px;
    }

    .section h2 {
      color: #f5a623;
    }

    /* RECIPES */
    .recipes {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 15px;
    }

    .card {
      width: 95%;
      max-width: 320px;
      background: #2b1a14;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
      color: #fff;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      color: #aaa;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .recipes {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .card {
        width: 220px;
      }

      .hero-content h1 {
        font-size: 48px;
      }

      .hero-content p {
        font-size: 18px;
      }
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    🍲 CookWith<span>Munavi</span>
  </div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#recipes">Recipes</a>
    <a href="#">Categories</a>
    <a href="#">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1># Simple Recipes, Made with Love</h1>
    <p>Easy, tasty and homemade recipes for every home cook</p>
    <a href="#recipes" class="explore-btn">Explore Recipes →</a>
  </div>
</div>

<!-- RECIPES -->
<div class="section" id="recipes">
  <h2>Most Loved Recipes</h2>

  <div class="recipes">

    <div class="card" onclick="openRecipe()">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b">
      <h3>Medu Vada</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 CookWithMunavi | Crafted with ❤️
</div>

<script>
function openRecipe() {
  window.location.href = "recipes/dals/palak-dal.html";
}
</script>

</body>
</html>
