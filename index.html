<!DOCTYPE html>
<html>
<head>
  <title>CookWithMunavi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #FFF8E1;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: #6D4C41;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .logo span {
      color: #FFB74D;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 14px;
    }

    .nav-links a {
      text-decoration: none;
      color: #FFCC80;
    }

    /* HERO IMAGE ONLY */
    .hero {
      margin-top: 70px;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* INTRO TEXT BELOW IMAGE */
    .intro {
      text-align: center;
      padding: 20px;
    }

    .intro h1 {
      font-size: 24px;
      color: #5D4037;
      margin-bottom: 10px;
    }

    .intro p {
      color: #6D4C41;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .explore-btn {
      background: #FFB74D;
      color: #3E2723;
      padding: 10px 20px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
    }

    /* SECTION */
    .section {
      text-align: center;
      margin-top: 30px;
      padding: 0 10px;
    }

    .section h2 {
      color: #5D4037;
    }

    /* RECIPES */
    .recipes {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 15px;
    }

    .card {
      width: 95%;
      max-width: 320px;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
      color: #5D4037;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      color: #5D4037;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .recipes {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .card {
        width: 220px;
      }

      .intro h1 {
        font-size: 36px;
      }

      .intro p {
        font-size: 16px;
      }
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    🍲 CookWith<span>Munavi</span>
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="#">Recipes</a>
    <a href="#">Categories</a>
    <a href="#">About</a>
  </div>
</div>

<!-- HERO IMAGE ONLY -->
<div class="hero">
  <img src="images/file_000000001274724382bf6cb4f9484d1c.png" alt="Food Banner">
</div>

<!-- INTRO BELOW IMAGE -->
<div class="intro">
  <h1>Simple Recipes, Made with Love</h1>
  <p>Easy, tasty and homemade recipes for every home cook</p>
  <a href="#recipes" class="explore-btn">Explore Recipes →</a>
</div>

<!-- RECIPES -->
<div class="section" id="recipes">
  <h2>Most Loved Recipes</h2>

  <div class="recipes">

    <div class="card" onclick="openRecipe()">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b">
      <h3>Medu Vada</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 CookWithMunavi
</div>

<script>
function openRecipe() {
  window.location.href = "recipes/dals/palak-dal.html";
}
</script>

</body>
</html>
