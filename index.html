<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Fresh & Lovely</title>
    
    <!-- Premium Font Pair -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --berry-deep: #5D1F2B;    /* Deep Berry for text */
            --strawberry: #FF4D6D;    /* Popping Pink for buttons */
            --cream-soft: #FFF9FB;    /* Super fresh cream background */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--cream-soft);
            color: var(--berry-deep);
            line-height: 1.6;
        }

        /* 🧼 CLEAN MODERN NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            border-bottom: 2px solid var(--cream-soft);
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--strawberry); }

        .nav-links a {
            margin-left: 25px; text-decoration: none; 
            color: var(--berry-deep); font-weight: 700;
            font-size: 15px; position: relative; padding: 5px 0;
        }

        /* Smooth Underline Hover */
        .nav-links a::after {
            content: ''; position: absolute; width: 0; height: 2px;
            bottom: 0; left: 0; background: var(--strawberry); transition: 0.3s;
        }
        .nav-links a:hover::after { width: 100%; }

        /* 🥗 LOVELY HERO SECTION */
        .hero {
            margin-top: 60px; height: 70vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #FFF0F3 0%, #FFF9FB 100%);
        }

        .glass-panel {
            background: var(--white);
            padding: 60px 80px;
            border-radius: 60px; /* Lovely extra-round corners */
            text-align: center;
            box-shadow: 0 20px 50px rgba(93, 31, 43, 0.08);
            max-width: 85%;
        }

        .main-text { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin-bottom: 10px; }
        .sub-text { font-family: 'Playfair Display', serif; font-style: italic; color: var(--strawberry); font-size: 1.8rem; }

        /* 🔘 BERRY POP BUTTON */
        .explore-btn {
            background: var(--strawberry);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none; font-weight: 800;
            display: inline-block; margin-top: 30px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.3);
        }

        .explore-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: var(--berry-deep);
            box-shadow: 0 15px 35px rgba(93, 31, 43, 0.4);
        }

        /* 🖼️ RECIPE GRID */
        .section { padding: 80px 20px; text-align: center; }
        .recipes-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: white; border-radius: 50px; overflow: hidden;
            transition: 0.4s; box-shadow: 0 10px 30px rgba(93, 31, 43, 0.04);
            cursor: pointer;
        }

        .card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px rgba(93, 31, 43, 0.1); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card h3 { padding: 30px; font-weight: 800; font-size: 22px; }

        /* ⚓ SLIM FOOTER */
        .footer {
            padding: 40px; border-top: 1px solid #f0f0f0; text-align: center;
        }
        .footer-content {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; flex-wrap: wrap; opacity: 0.7; font-size: 13px; font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CookWith<span>Munavi</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <header class="hero">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2 style="font-size: 36px; margin-bottom: 50px;">Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal" onerror="this.src='https://placehold.jp'">
                <h3>Palak Dal</h3>
            </div>
            <div class="card"><img src="https://unsplash.com"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <strong style="color:var(--berry-deep)">CookWith<span style="color:var(--strawberry)">Munavi</span></strong>
            <span>|</span>
            <span>© 2026 THE LOVELY KITCHEN</span>
            <span>|</span>
            <span style="font-style: italic;">Fresh • Healthy • Easy</span>
        </div>
    </footer>

</body>
</html>
