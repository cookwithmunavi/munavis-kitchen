<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Fresh Culinary Art</title>

    <!-- High-End Typography -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* 🌿 APPLE GREEN & FOREST THEME */
        :root {
            --apple-green: #9DD45D;   /* Your chosen color */
            --deep-forest: #1B3022;   /* Contrast color for text */
            --white: #ffffff;
            --nav-bg: #1B3022;        /* Dark roof for the site */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--apple-green);
            color: var(--deep-forest);
            scroll-behavior: smooth;
        }

        /* 🧼 EXPERT NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: var(--nav-bg);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 4px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo .white { color: var(--white); }
        .logo .green { color: var(--apple-green); }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            position: relative;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--apple-green); }

        /* 🥗 HERO SECTION */
        .hero {
            margin-top: 60px;
            height: 70vh;
            background: var(--nav-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 💎 CRYSTAL GLASS PANEL */
        .glass-panel {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 70px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            max-width: 85%;
        }

        .hero-title .main-text { 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            font-weight: 800; 
            display: block; 
            color: var(--deep-forest);
            line-height: 1.1;
        }

        .hero-title .sub-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.6rem;
            color: var(--apple-green);
            margin-top: 10px;
            display: block;
        }

        /* 🔘 ACTION BUTTON */
        .explore-btn {
            background: var(--nav-bg);
            color: var(--white);
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 30px;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .explore-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: var(--apple-green);
            color: var(--deep-forest);
        }

        /* 🖼️ RECIPE GRID: White Cards on Green BG looks stunning! */
        .section {
            padding: 100px 20px;
            text-align: center;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 60px;
            color: var(--white);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 35px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-20px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: 0.6s ease;
        }

        .card:hover img { transform: scale(1.1); }

        .card h3 {
            padding: 30px;
            font-weight: 800;
            font-size: 24px;
            color: var(--deep-forest);
        }

        /* 🦶 FOOTER */
        .footer {
            padding: 60px;
            text-align: center;
            background: var(--nav-bg);
            color: var(--white);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <span class="white">CookWith</span><span class="green">Munavi</span>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <!-- RECIPES -->
    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal" onerror="this.src='https://placehold.jp'">
                <h3>Palak Dal</h3>
            </div>

            <div class="card">
                <img src="https://unsplash.com" alt="Masala Dosa">
                <h3>Masala Dosa</h3>
            </div>

            <div class="card">
                <img src="https://unsplash.com" alt="Chicken Biryani">
                <h3>Chicken Biryani</h3>
            </div>

        </div>
    </section>

    <footer class="footer">
        <p>© 2026 CookWithMunavi | Fresh • Healthy • Easy</p>
    </footer>

</body>
</html>
