<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookWithMunavi | Fresh Beginner Recipes</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* 🌿 PESTO & BASIL THEME */
:root {
  --deep-forest: #0B2F2A; /* Your chosen dark green */
  --leaf-green: #8BC34A;  /* Popping fresh green */
  --soft-mint: #E8F5E9;   /* Background for light sections */
  --white: #ffffff;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--deep-forest);
  color: var(--white);
  overflow-x: hidden;
}

/* 🔥 NAVBAR (FRESH OVERLAY) */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(11, 47, 42, 0.85); /* Deep Forest Glass */
  backdrop-filter: blur(12px);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  border-bottom: 1px solid rgba(139, 195, 74, 0.3);
}

.logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.logo .white { color: var(--white); }
.logo .gold { color: var(--leaf-green); } /* Updated to Leaf Green */

.nav-links a {
  margin-left: 20px;
  text-decoration: none;
  color: #B2DFDB;
  font-size: 14px;
  font-weight: 600;
  transition: 0.3s;
}

.nav-links a:hover { color: var(--leaf-green); }

/* 🥗 HERO SECTION */
.hero { margin-top: 60px; position: relative; overflow: hidden; }

.hero img {
  width: 100%;
  max-height: 85vh;
  object-fit: cover;
  filter: brightness(0.8); /* Makes the button pop more */
}

.hero-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.explore-btn {
  background: var(--leaf-green);
  color: var(--deep-forest);
  padding: 16px 36px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 800;
  font-size: 18px;
  transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: inline-block;
  box-shadow: 0 10px 30px rgba(139, 195, 74, 0.4);
}

.explore-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 15px 40px rgba(139, 195, 74, 0.6);
  background: #9ccc65;
}

/* 💎 RECIPE SECTION */
.section {
  text-align: center;
  padding: 80px 20px;
  background: #082420; /* Slightly darker than base */
}

.section h2 {
  color: var(--leaf-green);
  font-size: 32px;
  margin-bottom: 40px;
  font-family: 'Playfair Display', serif;
}

.recipes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ✨ UPGRADED CARDS */
.card {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(139, 195, 74, 0.1);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.5s;
  opacity: 0;
  transform: translateY(30px);
}

.card.show { opacity: 1; transform: translateY(0); }

.card:hover {
  transform: translateY(-12px);
  border-color: var(--leaf-green);
  background: rgba(139, 195, 74, 0.05);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: 0.5s;
}

.card:hover img { transform: scale(1.1); }

.card h3 {
  padding: 20px;
  font-size: 20px;
  color: var(--white);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 40px;
  color: #80cbc4;
  background: var(--deep-forest);
  border-top: 1px solid rgba(139, 195, 74, 0.1);
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">
    <span class="white">CookWith</span><span class="gold">Munavi</span>
  </div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#recipes">Recipes</a>
  </div>
</div>

<div class="hero">
  <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png" alt="Fresh Kitchen">
  <div class="hero-btn">
    <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
  </div>
</div>

<div class="section" id="recipes">
  <h2>Most Loved Recipes</h2>
  <div class="recipes">
    <div class="card" onclick="openRecipe()">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>
  </div>
</div>

<div class="footer">
  © 2026 CookWithMunavi | Fresh • Healthy • Easy
</div>

<script>
function openRecipe() { window.location.href = "recipes/dals/palak-dal.html"; }

const cards = document.querySelectorAll('.card');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting) entry.target.classList.add('show');
  });
}, { threshold: 0.1 });
cards.forEach(card => observer.observe(card));
</script>

</body>
</html>
