<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CookWithMunavi</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #f5f2ee;
}

/* ================= NAVBAR ================= */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 14px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(25, 15, 10, 0.85);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

/* BRAND */
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
  font-weight: 600;
  color: white;
}

.logo span {
  color: #f5a623;
  font-weight: 700;
}

/* NAV LINKS */
.nav-links {
  display: flex;
  gap: 25px;
}

.nav-links a {
  text-decoration: none;
  color: #ddd;
  font-weight: 500;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #f5a623;
}

/* ================= HERO ================= */
.hero {
  margin-top: 70px;
  width: 100%;
  display: flex;
  justify-content: center;
}

/* FULL IMAGE (NO CROP) */
.hero img {
  width: 100%;
  height: auto;
  display: block;
}

/* TEXT OVER IMAGE */
.hero-content {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  padding: 0 20px;
}

.hero-content h1 {
  font-size: 42px;
  font-weight: 700;
}

.hero-content p {
  margin: 15px 0;
  font-size: 16px;
  color: #eee;
}

/* BUTTON */
.hero-btn {
  display: inline-block;
  padding: 14px 28px;
  background: #f5a623;
  color: white;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  margin-top: 10px;
  transition: 0.3s;
}

.hero-btn:hover {
  background: #e6951c;
}

/* ================= SECTION ================= */
.section {
  text-align: center;
  margin-top: 40px;
}

.section h2 {
  color: #7a2e1f;
}

/* ================= RECIPES ================= */
.recipes {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.card {
  width: 220px;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
  color: #7a2e1f;
}

/* ================= FOOTER ================= */
.footer {
  text-align: center;
  padding: 20px;
  color: #7a2e1f;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  .logo {
    font-size: 18px;
  }

  .nav-links {
    gap: 12px;
    font-size: 14px;
  }

  .hero-content h1 {
    font-size: 26px;
  }

  .hero-content p {
    font-size: 14px;
  }

  .hero-btn {
    padding: 10px 20px;
    font-size: 14px;
  }

  .card {
    width: 90%;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    CookWith<span>Munavi</span>
  </div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Recipes</a>
    <a href="#">Categories</a>
    <a href="#">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">

  <!-- YOUR IMAGE -->
  <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png" alt="Food Banner">

  <!-- TEXT -->
  <div class="hero-content">
    <h1>Simple Recipes, Made with Love</h1>
    <p>Easy, tasty and homemade recipes for every home cook</p>
    <a href="#" class="hero-btn">Explore Recipes →</a>
  </div>

</div>

<!-- RECIPES -->
<div class="section">
  <h2>Most Loved Recipes</h2>

  <div class="recipes">

    <div class="card">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b">
      <h3>Medu Vada</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 CookWithMunavi | Everyday Cooking Made Simple
</div>

</body>
  </html>
