<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Cooking Made Easy</title>

    <!-- 2026 Trend Typography -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* 🌿 MINT & PESTO PALETTE */
        :root {
            --light-mint: #D1E8E2;
            --spinach-green: #2E5A2F;
            --basil-pop: #8BC34A;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--light-mint);
            color: var(--spinach-green);
        }

        /* 🧼 TRANSPARENT NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: transparent; /* Crystal clear */
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: 0.3s;
        }

        /* Scrolled State for Navbar visibility */
        .navbar.scrolled {
            background: rgba(209, 232, 226, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
        }

        .logo { font-size: 24px; font-weight: 800; }
        .logo .brand-dark { color: var(--spinach-green); }
        .logo .brand-pop { color: var(--basil-pop); }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: var(--spinach-green);
            font-weight: 700;
        }

        /* 🥗 CRYSTAL CLEAR HERO */
        .hero {
            position: relative;
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* 💎 THE GLASS BOX */
        .glass-panel {
            position: relative;
            z-index: 3;
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* This creates the glass look */
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 70px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            max-width: 80%;
        }

        .hero-title .main-text { 
            display: block; 
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800; 
            color: var(--spinach-green);
            line-height: 1;
        }

        .hero-title .sub-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--spinach-green);
            margin-top: 10px;
            display: block;
        }

        /* 🔘 ACTION BUTTON */
        .explore-btn {
            background: var(--basil-pop);
            color: var(--white);
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 30px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(139, 195, 74, 0.3);
        }

        .explore-btn:hover {
            transform: scale(1.05);
            background: var(--spinach-green);
        }

        /* 🖼️ RECIPES GRID */
        .section { padding: 80px 20px; text-align: center; }
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.4s;
        }

        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card h3 { padding: 20px; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="logo">
            <span class="brand-dark">CookWith</span><span class="brand-pop">Munavi</span>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <header class="hero">
        <!-- Your original clear image -->
        <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png" alt="Clear Food Photo">
        
        <!-- THE GLASS PANEL -->
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="location.href='recipes/dals/palak-dal.html'">
                <img src="images/palak-dal.jpeg" alt="Palak Dal">
                <h3>Palak Dal</h3>
            </div>
            <div class="card"><img src="https://unsplash.com" alt="Dosa"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com" alt="Biryani"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

    <script>
        // Navbar scroll effect
        window.onscroll = function() {
            var nav = document.getElementById('navbar');
            if (window.pageYOffset > 50) {
                nav.classList.add("scrolled");
            } else {
                nav.classList.remove("scrolled");
            }
        };
    </script>
</body>
</html>
