<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Master the Art of Cooking</title>

    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --nav-dark: #1E392F;
            --bg-mint-light: #F1F9F6; /* NEW: Crisper Light Mint Shade */
            --section-mint: #E8F5F1;  /* Slightly deeper mint for separation */
            --basil-pop: #8BC34A;
            --white: #ffffff;
            --text-main: #2E5A2F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-mint-light); 
            color: var(--text-main); 
            scroll-behavior: smooth; 
            overflow-x: hidden; 
        }

        /* 🧼 EXPERT NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: var(--nav-dark);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--basil-pop);
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo .white { color: var(--white); }
        .logo .green { color: var(--basil-pop); }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            position: relative;
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--basil-pop); }
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0; height: 2px;
            bottom: 0; left: 50%;
            background: var(--basil-pop);
            transition: all 0.3s ease;
        }
        .nav-links a:hover::after { width: 100%; left: 0; }

        /* 🥗 HERO SECTION */
        .hero { 
            margin-top: 65px; 
            position: relative; 
            height: 75vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: var(--nav-dark); 
        }
        
        /* 💎 CRYSTAL GLASS PANEL */
        .glass-panel {
            position: relative; z-index: 3;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 60px; border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            max-width: 80%;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .explore-btn {
            background: var(--basil-pop);
            color: var(--white);
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 30px;
            transition: 0.4s;
            text-transform: uppercase;
        }
        .explore-btn:hover { transform: scale(1.05) translateY(-5px); background: var(--text-main); }

        /* 🖼️ RECIPE CARDS */
        .section { 
            padding: 100px 20px; 
            text-align: center; 
            background: var(--section-mint); /* Mint separation */
        }
        .section h2 { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 60px; }

        .recipes-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card {
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 10px 30px rgba(46, 90, 47, 0.08);
            cursor: pointer;
            border: 1px solid rgba(46, 90, 47, 0.05);
        }

        .card:hover { transform: translateY(-15px); box-shadow: 0 30px 60px rgba(30, 57, 47, 0.15); }

        .card-img-container { overflow: hidden; height: 260px; background: #f0f0f0; position: relative; }
        
        /* Placeholder styling for broken images */
        .card-img-container::before {
            content: "Refreshing Flavor...";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc; font-weight: 600;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; position: relative; z-index: 2; }
        .card:hover img { transform: scale(1.1); }

        .card h3 { padding: 30px; font-weight: 800; font-size: 24px; transition: 0.3s; }
        .card:hover h3 { color: var(--basil-pop); }

        .footer { padding: 60px; text-align: center; background: var(--nav-dark); color: var(--white); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><span class="white">CookWith</span><span class="green">Munavi</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <header class="hero">
        <!-- Hero Background Tinted Mint -->
        <div style="position:absolute; width:100%; height:100%; background: var(--bg-mint-light); opacity: 0.1; z-index:1;"></div>
        
        <div class="glass-panel">
            <h1 class="hero-title">
                <span style="font-size: clamp(2rem, 5vw, 3.5rem); display: block; font-weight: 800; color: var(--text-main);">Cooking Made Easy.</span>
                <span style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: var(--basil-pop);">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <div class="card-img-container">
                    <img src="images/palak-dal.jpeg" alt="Palak Dal" onerror="this.style.display='none'">
                </div>
                <h3>Palak Dal</h3>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img src="https://unsplash.com" alt="Masala Dosa" onerror="this.style.display='none'">
                </div>
                <h3>Masala Dosa</h3>
            </div>

            <div class="card">
                <div class="card-img-container">
                    <img src="https://unsplash.com" alt="Chicken Biryani" onerror="this.style.display='none'">
                </div>
                <h3>Chicken Biryani</h3>
            </div>

        </div>
    </section>

    <footer class="footer">
        <p>© 2026 CookWithMunavi | Fresh • Healthy • Easy</p>
    </footer>

</body>
</html>
