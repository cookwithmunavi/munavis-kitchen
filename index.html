<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Indian Culinary Art</title>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --deep-teal: #004D40;     /* Fresh Deep Green-Blue */
            --saffron: #FF9933;       /* Popping Saffron Orange */
            --ice-white: #F9FBFB;     /* Crisp Minty White */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--ice-white); color: var(--deep-teal); }

        /* 🧼 FLOATING NAV */
        .navbar {
            padding: 30px 80px;
            display: flex; justify-content: space-between; align-items: center;
            position: absolute; width: 100%; top: 0; z-index: 100;
        }

        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--saffron); }

        .nav-links a {
            margin-left: 40px; text-decoration: none; color: var(--deep-teal);
            font-weight: 700; font-size: 15px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--saffron); }

        /* 🥘 DYNAMIC HERO SECTION */
        .hero {
            display: flex; align-items: center;
            min-height: 90vh; padding: 120px 80px 40px;
            max-width: 1400px; margin: 0 auto;
        }

        .hero-text { flex: 1.2; z-index: 2; }
        .hero-title { font-size: clamp(3rem, 6vw, 4.8rem); font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .hero-title span { color: var(--saffron); }
        .hero-subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; color: #666; margin-bottom: 45px; }

        .explore-btn {
            background: var(--saffron); color: white;
            padding: 22px 50px; border-radius: 60px;
            text-decoration: none; font-weight: 800; display: inline-block;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(255, 153, 51, 0.3);
        }
        .explore-btn:hover { transform: scale(1.05) translateY(-5px); background: var(--deep-teal); box-shadow: 0 20px 40px rgba(0, 77, 64, 0.2); }

        /* 🍛 THE FLOATING THALI VISUAL */
        .hero-visual { flex: 1; position: relative; display: flex; justify-content: flex-end; align-items: center; }
        
        .thali-circle {
            width: 500px; height: 500px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff 0%, #eee 100%);
            border: 15px solid white;
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Animated Spice Accents to fill the "White Space" */
        .spice-accent {
            position: absolute; width: 40px; height: 40px;
            background: var(--saffron); border-radius: 50%; opacity: 0.2;
            filter: blur(20px); animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }

        /* 🖼️ RECIPE GRID */
        .section { padding: 100px 80px; background: white; border-radius: 80px 80px 0 0; box-shadow: 0 -20px 50px rgba(0,0,0,0.02); }
        .section-title { font-size: 38px; text-align: center; margin-bottom: 60px; font-family: 'Playfair Display', serif; }

        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        
        .card { 
            background: var(--ice-white); border-radius: 50px; overflow: hidden; transition: 0.4s; cursor: pointer; 
            border: 1px solid #f0f0f0;
        }
        .card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card h3 { padding: 30px; font-weight: 800; font-size: 22px; text-align: center; }

        .footer { padding: 60px; text-align: center; border-top: 1px solid #f0f0f0; background: var(--white); }
        .footer-content { display: flex; justify-content: center; align-items: center; gap: 20px; font-weight: 700; opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CookWith<span>Munavi</span></div>
        <div class="nav-links"><a href="#">Home</a><a href="#recipes">Recipes</a></div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1 class="hero-title">Indian Food<br><span>Made Easy.</span></h1>
            <p class="hero-subtitle">Vibrant flavors, simplified steps.</p>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>

        <div class="hero-visual">
            <div class="spice-accent" style="top: 10%; right: 40%;"></div>
            <div class="spice-accent" style="bottom: 10%; right: 10%; animation-delay: 2s;"></div>
            
            <div class="thali-circle">
                <!-- Replace with a colorful multi-cuisine platter image -->
                <img src="https://unsplash.com" 
                     style="width: 100%; height: 100%; object-fit: cover;" alt="Indian Platter">
            </div>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2 class="section-title">Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal">
                <h3>Palak Dal</h3>
            </div>
            <div class="card"><img src="https://unsplash.com"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <span style="opacity: 0.2;">|</span>
            <span>© 2026 cookwithmunavi</span>
        </div>
    </footer>

</body>
</html>
