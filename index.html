<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Fresh & Simple</title>

    <!-- 2026 Trend Typography -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* 🌿 MINT & PESTO PALETTE */
        :root {
            --light-mint: #D1E8E2;    /* Airy Background */
            --spinach-green: #2E5A2F; /* Deep Text Contrast */
            --pesto-green: #4F7942;   /* Strong Accents */
            --basil-pop: #8BC34A;     /* Vibrant Action Color */
            --cream-white: #F8FDF9;   /* Card Background */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--light-mint);
            color: var(--spinach-green);
            line-height: 1.6;
        }

        /* 🧼 GLASS NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(209, 232, 226, 0.85);
            backdrop-filter: blur(10px);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(46, 90, 47, 0.1);
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo .brand-dark { color: var(--spinach-green); }
        .logo .brand-pop { color: var(--basil-pop); }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: var(--spinach-green);
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--basil-pop); }

        /* 🥗 LIGHT HERO SECTION */
        .hero {
            margin-top: 60px;
            position: relative;
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .hero img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.9); /* Keeps it light and airy */
            z-index: 1;
        }

        /* Subtle Light Overlay for Text Clarity */
        .hero::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(209,232,226,0.3) 0%, rgba(209,232,226,0.6) 100%);
            z-index: 2;
        }

        .hero-content { position: relative; z-index: 3; width: 90%; }

        .hero-title {
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .hero-title .main-text { 
            display: block; 
            font-weight: 800; 
            color: var(--spinach-green);
        }

        .hero-title .sub-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            font-size: 0.6em;
            color: var(--pesto-green);
        }

        /* 🔘 VIBRANT ACTION BUTTON */
        .explore-btn {
            background: var(--basil-pop);
            color: #fff;
            padding: 20px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-top: 25px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(139, 195, 74, 0.3);
        }

        .explore-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: var(--spinach-green);
            box-shadow: 0 15px 40px rgba(46, 90, 47, 0.3);
        }

        /* 💎 MODERN RECIPE CARDS */
        .section { padding: 100px 20px; text-align: center; }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            margin-bottom: 50px;
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--cream-white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(46, 90, 47, 0.05);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(46, 90, 47, 0.05);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 60px rgba(46, 90, 47, 0.12);
        }

        .card img { width: 100%; height: 260px; object-fit: cover; }

        .card h3 {
            padding: 25px;
            font-size: 24px;
            font-weight: 700;
            color: var(--spinach-green);
        }

        /* 🦶 FOOTER */
        .footer {
            padding: 80px 20px;
            text-align: center;
            border-top: 1px solid rgba(46, 90, 47, 0.05);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="brand-dark">CookWith</span><span class="brand-pop">Munavi</span>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <header class="hero">
        <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png" alt="Fresh Kitchen">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            <!-- Palak Dal Card -->
            <div class="card" onclick="location.href='recipes/dals/palak-dal.html'">
                <img src="images/palak-dal.jpeg" alt="Palak Dal">
                <h3>Palak Dal</h3>
            </div>
            <!-- Additional Cards -->
            <div class="card"><img src="https://unsplash.com" alt="Dosa"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com" alt="Biryani"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 CookWithMunavi | Fresh • Healthy • Easy</p>
    </footer>

</body>
</html>
