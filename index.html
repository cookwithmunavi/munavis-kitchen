<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookWithMunavi</title>

<link rel="preload" as="image" href="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* 🌿 COZY PREMIUM BACKGROUND */
body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1410; /* warm dark brown */
  color: #f5f5f5;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #1c1511;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  border-bottom: 1px solid rgba(245,166,35,0.2);
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.logo .white { color: #fff; }
.logo .gold { color: #f5a623; }

.nav-links a {
  margin-left: 15px;
  text-decoration: none;
  color: #c7b8a3;
  font-size: 14px;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #f5a623;
}

/* HERO */
.hero {
  margin-top: 60px;
  position: relative;
}

.hero img {
  width: 100%;
  height: auto;
  max-height: 90vh;
  object-fit: contain;
  background: black;
}

/* CENTER BUTTON ONLY */
.hero-btn {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* PREMIUM BUTTON */
.explore-btn {
  background: linear-gradient(135deg, #f5a623, #ffcc80);
  color: #2a1a0f;
  padding: 14px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s;
}

.explore-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(245,166,35,0.4);
}

/* SECTION */
.section {
  text-align: center;
  padding: 40px 15px;
  background: #221a15;
  border-top: 1px solid rgba(245,166,35,0.1);
}

.section h2 {
  color: #f5a623;
  font-size: 26px;
  position: relative;
}

/* GOLD LINE UNDER TITLE */
.section h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 3px;
  background: #f5a623;
  margin: 10px auto;
  border-radius: 2px;
}

/* RECIPES */
.recipes {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* PREMIUM CARD */
.card {
  width: 90%;
  max-width: 320px;
  background: #2a201a;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(245,166,35,0.15);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* CARD TITLE */
.card h3 {
  margin: 12px;
  color: #ffcc80;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #c7b8a3;
  background: #1c1511;
  border-top: 1px solid rgba(245,166,35,0.1);
}

/* DESKTOP */
@media (min-width: 768px) {
  .card { width: 220px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <span class="white">CookWith</span>
    <span class="gold">Munavi</span>
  </div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#recipes">Recipes</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png" alt="Food Banner">

  <div class="hero-btn">
    <a href="#recipes" class="explore-btn">Explore Recipes →</a>
  </div>
</div>

<!-- RECIPES -->
<div class="section" id="recipes">
  <h2>Most Loved Recipes</h2>

  <div class="recipes">

    <div class="card" onclick="openRecipe()">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b">
      <h3>Medu Vada</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 CookWithMunavi
</div>

<script>
function openRecipe() {
  window.location.href = "recipes/dals/palak-dal.html";
}
</script>

</body>
</html>
