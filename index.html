<!DOCTYPE html>
<html>
<head>
  <title>CookWithMunavi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15,15,15,0.95);
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
    }

    .logo .white { color: white; }
    .logo .gold { color: #f4a825; }

    .nav-links {
      display: flex;
      gap: 15px;
      font-size: 14px;
    }

    .nav-links a {
      text-decoration: none;
      color: #ddd;
    }

    .nav-links a:hover {
      color: #f4a825;
    }

    /* HERO */
    .hero {
      margin-top: 60px;
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 85vh;
      object-fit: cover;
    }

    /* HERO TEXT */
    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 15px;
      width: 90%;
    }

    .hero-text h1 {
      font-size: clamp(26px, 6vw, 48px);
      margin-bottom: 10px;
    }

    .hero-text p {
      font-size: clamp(14px, 3vw, 18px);
      margin-bottom: 20px;
      color: #eee;
    }

    .explore-btn {
      background: #f4a825;
      color: black;
      padding: 12px 22px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
    }

    /* SECTION */
    .section {
      text-align: center;
      margin-top: 30px;
      padding: 20px 10px;
    }

    .section h2 {
      color: #f4a825;
      margin-bottom: 20px;
    }

    /* RECIPES */
    .recipes {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 10px;
    }

    .card {
      width: 95%;
      max-width: 320px;
      background: #1c1c1c;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid #333;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
      color: #f4a825;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      color: #aaa;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      .recipes {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .card {
        width: 220px;
      }
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <span class="white">CookWith</span>
    <span class="gold">Munavi</span>
  </div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#recipes">Recipes</a>
    <a href="#">Categories</a>
    <a href="#">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png">

  <div class="hero-text">
    <h1>Simple Recipes, Made with Love</h1>
    <p>Easy, tasty and homemade recipes for every home cook</p>
    <a href="#recipes" class="explore-btn">Explore Recipes →</a>
  </div>
</div>

<!-- RECIPES -->
<div class="section" id="recipes">
  <h2>Most Loved Recipes</h2>

  <div class="recipes">

    <div class="card" onclick="openRecipe()">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b">
      <h3>Medu Vada</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 CookWithMunavi
</div>

<script>
function openRecipe() {
  window.location.href = "recipes/dals/palak-dal.html";
}
</script>

</body>
</html>
