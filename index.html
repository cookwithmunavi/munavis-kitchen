<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CookWithMunavi</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: #333;
}

/* HERO WITH BEACH IMAGE */
.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  position: relative;
}

/* overlay for readability */
.hero::after {
  content: "";
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.3);
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 18px;
}

/* SEARCH */
.search-box {
  margin-top: 25px;
}

.search-box input {
  padding: 15px;
  width: 300px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* CATEGORY SECTION */
.categories {
  text-align: center;
  padding: 50px 20px;
  background: linear-gradient(to bottom, #fff2e6, #ffe0cc);
}

.categories h2 {
  font-family: 'Playfair Display', serif;
  color: #d65a31;
}

.category-grid {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
  margin-top: 30px;
}

.category {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 20px;
  width: 130px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.category:hover {
  transform: scale(1.08);
}

.category img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
}

.category p {
  margin-top: 8px;
  font-weight: 500;
}

/* RECIPES */
.recipes {
  padding: 40px;
  background: #fff8f2;
  text-align: center;
}

.recipes h2 {
  font-family: 'Playfair Display', serif;
  color: #d65a31;
}

.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card h3 {
  padding: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #ff8c42;
  color: white;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h2>Fresh & Delicious Recipes</h2>
    <p>Simple cooking for everyone — from beginner to pro</p>

    <div class="search-box">
      <input type="text" placeholder="Search recipes...">
    </div>
  </div>
</div>

<h3 style="text-align:center; margin-top:20px;">
  🚧 Site under development
</h3>
  
<!-- CATEGORIES -->
<div class="categories">
  <h2>Explore by Category</h2>

  <div class="category-grid">

    <a href="breakfast.html" style="text-decoration:none; color:black;">
      <div class="category">
        <img src="images/breakfast.png">
        <p>Breakfast</p>
      </div>
    </a>

    <a href="lunch.html" style="text-decoration:none; color:black;">
      <div class="category">
        <img src="images/lunch.png">
        <p>Lunch</p>
      </div>
    </a>

    <div class="category">
      <img src="https://source.unsplash.com/100x100/?indian,curry">
      <p>Dinner</p>
    </div>

    <div class="category">
      <img src="https://source.unsplash.com/100x100/?samosa">
      <p>Snacks</p>
    </div>

  </div>
</div>

<!-- RECIPES -->
<div class="recipes">
  <h2>Most Loved Recipes</h2>

  <div class="recipe-grid">

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?dal">
      <h3>Dal Tadka</h3>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?dosa">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?biryani">
      <h3>Veg Biryani</h3>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?snacks">
      <h3>Evening Snacks</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 CookWithMunavi | Everyday Cooking Made Simple ❤️</p>
</footer>

</body>
</html>
