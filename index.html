<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | The Fresh Edit</title>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --deep-forest: #162B23;   /* Deep Kale for text */
            --apricot: #FF7043;       /* Your lovely popping orange */
            --mint-light: #F7FAF7;    /* Base fresh mint */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ☀️ UPGRADE: Sun-Kissed Gradient Background */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #FFF5F2 0%, var(--mint-light) 50%, #F0F7F0 100%);
            color: var(--deep-forest);
            min-height: 100vh;
        }

        /* 🧼 GLASS NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            border-bottom: 2px solid rgba(255, 112, 67, 0.2);
        }

        .logo { font-size: 24px; font-weight: 800; color: var(--deep-forest); }
        .logo span { color: var(--apricot); }

        .nav-links a {
            margin-left: 30px; text-decoration: none; color: var(--deep-forest);
            font-weight: 700; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--apricot); }

        /* 🥗 FROSTED HERO SECTION */
        .hero {
            margin-top: 60px; height: 75vh;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            padding: 60px 80px;
            border-radius: 60px; /* Extra round for 'lovely' feel */
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            max-width: 85%;
        }

        .main-text { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 800; margin-bottom: 10px; }
        .sub-text { font-family: 'Playfair Display', serif; font-style: italic; color: var(--apricot); font-size: 1.8rem; }

        /* 🔥 GLOWING BUTTON */
        .explore-btn {
            background: var(--apricot);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none; font-weight: 800;
            display: inline-block; margin-top: 35px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 112, 67, 0.4);
        }

        .explore-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 112, 67, 0.6);
        }

        /* 🖼️ RECIPE GRID */
        .section { padding: 80px 20px; text-align: center; }
        .recipes-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px; max-width: 1100px; margin: 0 auto;
        }

        .card {
            background: white; border-radius: 50px; overflow: hidden;
            transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            cursor: pointer;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(22, 43, 35, 0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card h3 { padding: 25px; font-weight: 800; }

        /* ⚓ MODERN SLIM FOOTER */
        .footer {
            padding: 40px; background: white; text-align: center;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .footer-content {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; flex-wrap: wrap; opacity: 0.8; font-size: 14px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CookWith<span>Munavi</span></div>
        <div class="nav-links"><a href="#">Home</a><a href="#recipes">Recipes</a></div>
    </nav>

    <header class="hero">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2 style="font-size: 38px; margin-bottom: 50px;">Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal" onerror="this.src='https://placehold.jp'">
                <h3>Palak Dal</h3>
            </div>
            <div class="card"><img src="https://unsplash.com"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <span>© 2026 CookWithMunavi</span>
            <span>|</span>
            <span style="font-style: italic;">Fresh • Healthy • Easy</span>
        </div>
    </footer>

</body>
</html>
