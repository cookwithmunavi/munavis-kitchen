<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | The Modern Kitchen</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bright-orange: #FF9800; 
            --lime-green: #68A306;    
            --pure-white: #ffffff;
            --warm-bg: #FAF9F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--pure-white); 
            color: #333; 
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* 🧼 NAVBAR - Pinned to the top left */
        .navbar {
            padding: 30px 6% 10px;
            width: 100%; 
            background: transparent;
            position: absolute;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.2rem; /* Scaled for mobile */
            font-weight: 800; 
            color: var(--lime-green); 
            text-decoration: none;
        }
        .logo span { font-weight: 700; font-style: italic; color: var(--bright-orange); }

        /* 🥘 HERO SECTION - FORCED SIDE-BY-SIDE */
        .hero { 
            display: flex; 
            flex-direction: row; /* Keeps laptop style on mobile */
            height: 70vh; /* Limits height to prevent elongation */
            min-height: 400px;
            align-items: center; 
        }

        .hero-text { 
            flex: 1; 
            padding: 0 5%; 
            margin-top: 40px; /* Space for the logo */
        }

        .hero-title { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(1.2rem, 5vw, 3.5rem); /* Dynamically shrinks for mobile */
            font-weight: 800;
            line-height: 1.1; 
            color: var(--lime-green); 
            margin-bottom: 10px; 
        }

        .hero-title span { font-style: italic; font-weight: 700; color: var(--bright-orange); }

        .hero-subtitle { 
            font-size: clamp(0.7rem, 2vw, 1rem); 
            color: #666; 
            margin-bottom: 20px; 
            max-width: 250px; 
            font-weight: 400;
        }

        .btn-main {
            background: var(--bright-orange); 
            color: var(--pure-white); 
            padding: 10px 25px; /* Smaller button for mobile */
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 800; 
            display: inline-block; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size: 0.6rem;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.2);
        }

        /* 🏛️ GREEN VISUAL SECTION */
        .hero-visual { 
            flex: 1; 
            height: 100%; 
            background: var(--lime-green); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            /* The pointed edge */
            clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 15% 100%, 0% 50%);
        }

        .circle-frame {
            width: 80%; /* Takes up most of the green area */
            aspect-ratio: 1/1;
            background: var(--pure-white);
            border-radius: 50%; 
            overflow: hidden; 
            border: 5px solid var(--pure-white); /* Thinner border for mobile */
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .circle-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 💻 DESKTOP ADJUSTMENTS (Scaling UP for Laptop) */
        @media (min-width: 992px) {
            .navbar { padding: 40px 8% 10px; }
            .logo { font-size: 1.6rem; }
            .hero { height: 100vh; }
            .hero-text { padding: 0 8%; }
            .hero-title { font-size: 4rem; margin-bottom: 20px; }
            .hero-subtitle { font-size: 1.1rem; max-width: 450px; margin-bottom: 40px; }
            .btn-main { padding: 16px 45px; font-size: 12px; }
            .circle-frame { width: 480px; border-width: 15px; }
            .hero-visual { flex: 1.3; }
        }

        /* 🥗 RECIPES SECTION */
        .recipes { padding: 60px 8%; background: var(--warm-bg); text-align: center; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--lime-green); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 15px; padding: 15px; text-decoration: none; color: inherit; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: block; }
        .card-img { width: 100%; height: 200px; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        footer { padding: 40px 8%; text-align: center; border-top: 1px solid #eee; }
        .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 800; color: var(--lime-green); text-decoration: none; display: block; margin-bottom: 10px; }
        .footer-logo span { color: var(--bright-orange); font-style: italic; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">CookWith<span>Munavi</span></a>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1 class="hero-title">Taste the <span>Joy</span> of<br>Home Cooking.</h1>
            <p class="hero-subtitle">Elevated, beginner-friendly recipes designed for incredible results every time.</p>
            <a href="#recipes" class="btn-main">Explore the Recipes</a>
        </div>

        <div class="hero-visual">
            <div class="circle-frame">
                <!-- Replace with your image -->
                <img src="https://unsplash.com" alt="Cooking Joy">
            </div>
        </div>
    </header>

    <section class="recipes" id="recipes">
        <h2 class="section-title">Discover the Recipes</h2>
        <div class="grid">
            <a href="recipes/dals/palak-dal.html" class="card">
                <div class="card-img"><img src="images/palak-dal.jpeg" alt="Palak Dal"></div>
                <h3 style="font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--lime-green);">Aromatic Palak Dal</h3>
            </a>
        </div>
    </section>

    <footer>
        <a href="#" class="footer-logo">CookWith<span>Munavi</span></a>
        <p style="font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 2px;">© 2026 The Modern Kitchen</p>
    </footer>

</body>
</html>
