<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | The Modern Indian Kitchen</title>
    
    <!-- Premium Font Pair -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --deep-teal: #004D40;     /* Your professional green */
            --saffron: #FF9933;       /* Your popping orange */
            --silk: #FAF9F6;          /* New: Off-white silk background */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--silk); 
            color: var(--deep-teal);
            line-height: 1.6;
        }

        /* 🧼 SLIM & ELEGANT NAVBAR */
        .navbar {
            padding: 25px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: transparent;
            position: absolute; width: 100%; top: 0; z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--saffron); }

        .nav-links a {
            margin-left: 35px; text-decoration: none; color: var(--deep-forest);
            font-weight: 500; font-size: 14px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-links a:hover { color: var(--saffron); }

        /* 🥘 RESTRUCTURED HERO SECTION */
        .hero {
            display: flex; align-items: center;
            min-height: 85vh; padding: 120px 8% 60px;
            max-width: 1400px; margin: 0 auto;
            gap: 50px;
        }

        .hero-text { flex: 1; }

        /* Typography Fix: Smaller, balanced font sizes */
        .hero-title { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 3.8rem); 
            font-weight: 700; 
            line-height: 1.2; 
            margin-bottom: 15px; 
            color: var(--deep-teal);
        }
        .hero-title span { font-style: italic; font-weight: 600; color: var(--saffron); }

        .hero-subtitle { 
            font-size: 1.1rem; 
            color: #555; 
            margin-bottom: 35px; 
            max-width: 450px;
            font-weight: 400;
        }

        .explore-btn {
            background: var(--saffron); color: white;
            padding: 16px 35px; border-radius: 4px; /* Classic Editorial Button */
            text-decoration: none; font-weight: 700; display: inline-block;
            transition: 0.4s;
            text-transform: uppercase; letter-spacing: 1px;
            font-size: 13px;
        }
        .explore-btn:hover { background: var(--deep-teal); transform: translateY(-3px); }

        /* 🍛 THE VISUAL: Elegant "Dish Portrait" */
        .hero-visual { 
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: flex-end; 
        }
        
        .dish-frame {
            width: 85%;
            aspect-ratio: 4/5;
            background: #eee;
            border-radius: 20px; /* Softer, but not a full circle */
            overflow: hidden;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .dish-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 🖼️ RECIPE GRID (CLEAN & TIDY) */
        .section { padding: 100px 5%; background: var(--white); }
        .section-title { 
            font-family: 'Playfair Display', serif;
            font-size: 32px; text-align: center; margin-bottom: 60px; 
        }

        .recipes-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; max-width: 1200px; margin: 0 auto; 
        }
        
        .card { 
            background: var(--silk); border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; 
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card h3 { 
            padding: 20px; font-weight: 700; font-size: 18px; text-align: left; 
            font-family: 'Playfair Display', serif;
        }

        .footer { 
            padding: 60px; text-align: center; background: var(--silk); 
            font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CookWith<span>Munavi</span></div>
        <div class="nav-links"><a href="#">Home</a><a href="#recipes">Recipes</a></div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1 class="hero-title">Indian Food,<br><span>Simply Made.</span></h1>
            <p class="hero-subtitle">Discover authentic, beginner-friendly recipes designed for the modern home kitchen.</p>
            <a href="#recipes" class="explore-btn">Browse Recipes</a>
        </div>

        <div class="hero-visual">
            <div class="dish-frame">
                <!-- Multi-cuisine professional Indian image -->
                <img src="https://unsplash.com" alt="Indian Feast">
            </div>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2 class="section-title">Most Loved This Week</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal">
                <h3>Palak Dal Tadka</h3>
            </div>
            <div class="card"><img src="https://unsplash.com"><h3>Crispy Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com"><h3>Dum Chicken Biryani</h3></div>
        </div>
    </section>

    <footer class="footer">
        <strong>CookWith<span style="color:var(--saffron)">Munavi</span></strong>
        <span style="margin: 0 15px; opacity: 0.3;">|</span>
        <span>© 2026 The Modern Kitchen</span>
    </footer>

</body>
</html>
