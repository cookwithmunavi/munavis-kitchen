<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | A Journey Through Indian Flavors</title>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --spice-red: #8B2635;      /* Deep Saffron/Chili Red */
            --turmeric: #F4B942;       /* Golden Turmeric Accent */
            --bg-silk: #FCF9F5;        /* Warm Off-White Silk */
            --forest: #1B3022;         /* Deep Forest Pesto */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-silk); color: var(--forest); }

        /* 🧼 FLOATING NAV */
        .navbar {
            padding: 25px 80px;
            display: flex; justify-content: space-between; align-items: center;
            position: absolute; width: 100%; top: 0; z-index: 100;
        }

        .logo { font-size: 26px; font-weight: 800; color: var(--forest); }
        .logo span { color: var(--spice-red); }

        .nav-links a {
            margin-left: 40px; text-decoration: none; color: var(--forest);
            font-weight: 700; font-size: 15px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--spice-red); }

        /* 🥘 UNIFIED HERO SECTION */
        .hero {
            display: flex; align-items: center;
            min-height: 90vh; padding: 100px 80px 40px;
            max-width: 1400px; margin: 0 auto;
        }

        .hero-text { flex: 1; z-index: 2; }
        .hero-title { font-size: clamp(3rem, 6vw, 5rem); font-weight: 800; line-height: 1; margin-bottom: 20px; color: var(--forest); }
        .hero-title span { color: var(--spice-red); }
        .hero-subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2rem; color: var(--turmeric); margin-bottom: 40px; }

        .explore-btn {
            background: var(--spice-red); color: white;
            padding: 20px 50px; border-radius: 60px;
            text-decoration: none; font-weight: 800; display: inline-block;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(139, 38, 53, 0.25);
        }
        .explore-btn:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 20px 40px rgba(139, 38, 53, 0.4); }

        /* 🍛 MULTI-CUISINE VISUAL */
        .hero-visual { flex: 1.2; position: relative; display: flex; justify-content: flex-end; }
        
        .main-image {
            width: 100%; max-width: 550px; height: 550px;
            border-radius: 50%; /* Traditional "Thali" circle shape */
            object-fit: cover;
            border: 15px solid white;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            animation: rotateThali 100s linear infinite;
        }

        @keyframes rotateThali { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        /* 🖼️ RECIPE GRID */
        .section { padding: 100px 80px; background: white; border-radius: 80px 80px 0 0; }
        .section-title { font-size: 38px; text-align: center; margin-bottom: 60px; font-family: 'Playfair Display', serif; }

        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--bg-silk); border-radius: 50px; overflow: hidden; transition: 0.4s; cursor: pointer; }
        .card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card h3 { padding: 30px; font-weight: 800; font-size: 22px; }

        .footer { padding: 60px; text-align: center; border-top: 1px solid #eee; display: flex; justify-content: center; gap: 20px; font-weight: 700; opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">CookWith<span>Munavi</span></div>
        <div class="nav-links"><a href="#">Home</a><a href="#recipes">Recipes</a></div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1 class="hero-title">Indian Food<br><span>Made Easy.</span></h1>
            <p class="hero-subtitle">Authentic flavors in every step.</p>
            <a href="#recipes" class="explore-btn">Start Your Journey →</a>
        </div>

        <div class="hero-visual">
            <!-- This image represents the multi-cuisine Indian Plate -->
            <img src="https://unsplash.com" class="main-image" alt="Indian Cuisine Platter">
        </div>
    </header>

    <section class="section" id="recipes">
        <h2 class="section-title">Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal">
                <h3>Palak Dal</h3>
            </div>
            <div class="card"><img src="https://unsplash.com"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

    <footer class="footer">
        <strong>CookWith<span style="color:var(--spice-red)">Munavi</span></strong>
        <span>|</span>
        <span>© 2026 THE FLAVOR ARCHIVE</span>
    </footer>

</body>
</html>
