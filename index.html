<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | The Classic Collection</title>

    <!-- Professional Typography -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* 🏛️ CLASSIC NAVY & WHITE PALETTE */
        :root {
            --navy-blue: #000066;     /* Your chosen Navbar color */
            --bg-white: #FFFFFF;      /* Crisp white background */
            --accent-green: #8BC34A;  /* Fresh green for buttons */
            --text-dark: #1A1A2E;     /* Dark navy-tinted text */
            --expert-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-white);
            color: var(--text-dark);
            scroll-behavior: smooth;
        }

        /* 🧼 NAVY NAVBAR (STARK & PROFESSIONAL) */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: var(--navy-blue);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo .white { color: #ffffff; }
        .logo .accent { color: var(--accent-green); }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--accent-green); }

        /* 🥗 HERO SECTION */
        .hero {
            margin-top: 65px;
            height: 75vh;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        /* 💎 CRYSTAL GLASS PANEL */
        .glass-panel {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 50px 70px;
            border-radius: 20px; /* More angular for a classic look */
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .main-text { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; display: block; color: var(--navy-blue); line-height: 1.1; }
        .sub-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: #555; margin-top: 10px; display: block; }

        .explore-btn {
            background: var(--navy-blue);
            color: #ffffff;
            padding: 16px 40px;
            border-radius: 4px; /* Classic sharp corners */
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .explore-btn:hover { background: var(--accent-green); color: var(--navy-blue); transform: translateY(-3px); }

        /* 🖼️ RECIPE GRID (THE "EXPERT LIFT") */
        .section {
            padding: 100px 20px;
            text-align: center;
        }

        .section h2 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 60px; color: var(--navy-blue); }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0,0,102,0.1); /* Soft navy shadow */
            border-color: var(--accent-green);
        }

        .card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .card:hover img { transform: scale(1.05); }

        .card h3 { padding: 25px; font-weight: 800; font-size: 22px; color: var(--navy-blue); }

        .footer { padding: 60px; text-align: center; background: var(--navy-blue); color: #fff; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <span class="white">CookWith</span><span class="accent">Munavi</span>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero">
        <img src="https://unsplash.com" alt="Hero">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <!-- RECIPES GRID -->
    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal" onerror="this.src='https://placehold.jp'">
                <h3>Palak Dal</h3>
            </div>

            <div class="card">
                <img src="https://unsplash.com" alt="Masala Dosa">
                <h3>Masala Dosa</h3>
            </div>

            <div class="card">
                <img src="https://unsplash.com" alt="Chicken Biryani">
                <h3>Chicken Biryani</h3>
            </div>

        </div>
    </section>

    <footer class="footer">
        <p>© 2026 CookWithMunavi | Fresh • Healthy • Easy</p>
    </footer>

</body>
</html>
