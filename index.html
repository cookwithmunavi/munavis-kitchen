<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Culinary Excellence</title>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --nav-dark: #1E392F;      /* Your Hero Green */
            --bg-fog: #F4F7F4;        /* NEW: Crisp Forest Fog (Matches Hero) */
            --section-sage: #E9EFE9;  /* Subtle Sage for depth */
            --leaf-pop: #8BC34A;      /* Your Basil Button Green */
            --white: #ffffff;
            --text-main: #1B2E26;     /* Matching Dark Green for text */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-fog); color: var(--text-main); scroll-behavior: smooth; }

        /* 🧼 PRO NAVBAR */
        .navbar {
            position: fixed; top: 0; width: 100%;
            background: var(--nav-dark);
            padding: 18px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--leaf-pop);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo .white { color: var(--white); }
        .logo .green { color: var(--leaf-pop); text-shadow: 0 0 10px rgba(139,195,74,0.3); }

        .nav-links a { margin-left: 30px; text-decoration: none; color: var(--white); font-weight: 700; transition: 0.3s; }
        .nav-links a:hover { color: var(--leaf-pop); }

        /* 🥗 HERO SECTION (NOW FLOWS INTO BODY) */
        .hero { 
            margin-top: 65px; height: 75vh; display: flex; align-items: center; justify-content: center; 
            background: var(--nav-dark); position: relative; overflow: hidden;
        }

        /* 💎 CRYSTAL GLASS PANEL */
        .glass-panel {
            position: relative; z-index: 3;
            background: rgba(255, 255, 255, 0.98); /* Almost solid white for contrast */
            padding: 50px 70px; border-radius: 40px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            max-width: 80%;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .main-text { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; display: block; line-height: 1.1; margin-bottom: 10px; }
        .sub-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: #4F7942; }

        .explore-btn {
            background: var(--leaf-pop);
            color: var(--nav-dark);
            padding: 18px 45px; border-radius: 50px;
            text-decoration: none; font-weight: 800; display: inline-block;
            margin-top: 30px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(139, 195, 74, 0.3);
        }
        .explore-btn:hover { transform: scale(1.05) translateY(-5px); background: var(--white); color: var(--leaf-pop); }

        /* 🖼️ RECIPE GRID (EXPERT DEPTH) */
        .section { padding: 100px 20px; text-align: center; background: var(--section-sage); }
        .section h2 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 60px; }

        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }

        .card {
            background: var(--white); border-radius: 30px; overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(30, 57, 47, 0.05);
            cursor: pointer; border: 1px solid rgba(46, 90, 47, 0.02);
        }

        .card:hover { transform: translateY(-15px); box-shadow: 0 30px 60px rgba(30, 57, 47, 0.12); }
        .card img { width: 100%; height: 260px; object-fit: cover; transition: 0.6s ease; }
        .card:hover img { transform: scale(1.1); }
        .card h3 { padding: 30px; font-weight: 800; font-size: 24px; color: var(--text-main); }

        .footer { padding: 60px; text-align: center; background: var(--nav-dark); color: var(--white); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><span class="white">CookWith</span><span class="green">Munavi</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <header class="hero">
        <!-- Optional: Add back your culinary image here -->
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal">
                <h3>Palak Dal</h3>
            </div>
            <div class="card">
                <img src="https://unsplash.com" alt="Masala Dosa">
                <h3>Masala Dosa</h3>
            </div>
            <div class="card">
                <img src="https://unsplash.com" alt="Chicken Biryani">
                <h3>Chicken Biryani</h3>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 CookWithMunavi | Fresh • Healthy • Easy</p>
    </footer>

</body>
</html>
