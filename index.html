<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | The Royal Collection</title>

    <!-- Professional Typography -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* 🏛️ ROYAL NAVY & GOLD PALETTE */
        :root {
            --navy-brand: #000066;    /* Deep Royal Navy */
            --royal-gold: #D4AF37;    /* Metallic Gold */
            --white: #ffffff;
            --text-dark: #001133;
            --round-lg: 40px;         /* Expert rounded corners */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--white); 
            color: var(--text-dark); 
            scroll-behavior: smooth; 
        }

        /* 🧼 LUXURY NAVBAR */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            background: var(--navy-brand);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 4px solid var(--royal-gold);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .logo { font-size: 26px; font-weight: 800; }
        .logo .white { color: var(--white); }
        .logo .gold { color: var(--royal-gold); }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--royal-gold); }

        /* 🥗 HERO SECTION */
        .hero {
            margin-top: 70px; 
            height: 75vh;
            background: var(--navy-brand);
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative; 
            overflow: hidden;
        }
        .hero img { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            filter: brightness(0.5); 
        }

        /* 💎 ROUNDED GLASS PANEL */
        .glass-panel {
            position: relative; z-index: 3;
            background: rgba(255, 255, 255, 0.98);
            padding: 55px 75px; 
            border-radius: var(--round-lg);
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--royal-gold);
            max-width: 85%;
        }

        .main-text { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: var(--navy-brand); line-height: 1.1; }
        .sub-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; color: var(--royal-gold); display: block; margin-top: 10px; }

        /* 🔘 UPDATED EXPERT BUTTON (Fixes White-on-White Hover) */
        .explore-btn {
            background: var(--royal-gold);
            color: var(--navy-brand);
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none; 
            font-weight: 800; 
            display: inline-block;
            margin-top: 35px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; 
            letter-spacing: 1px;
            border: 2px solid var(--royal-gold);
        }

        .explore-btn:hover { 
            transform: scale(1.05) translateY(-5px);
            background: var(--navy-brand); /* Dark Background */
            color: var(--royal-gold);      /* Gold Text - High Contrast */
            border-color: var(--royal-gold);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        /* 🖼️ RECIPE GRID */
        .section { padding: 100px 20px; text-align: center; background: #fafafa; }
        .section h2 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 60px; color: var(--navy-brand); }

        .recipes-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card {
            background: var(--white); 
            border-radius: var(--round-lg); /* Rounded Image & Card */
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            cursor: pointer; 
            border: 1px solid #eee;
        }

        .card:hover { 
            transform: translateY(-15px); 
            box-shadow: 0 30px 60px rgba(0, 0, 102, 0.15); 
            border-color: var(--royal-gold); 
        }

        .card img { 
            width: 100%; height: 260px; object-fit: cover; 
            transition: 0.6s; 
        }
        .card:hover img { transform: scale(1.1); }

        .card h3 { padding: 25px; font-weight: 800; font-size: 24px; color: var(--navy-brand); transition: 0.3s; }
        .card:hover h3 { color: var(--royal-gold); }

        /* ⚓ MATCHING SINGLE-LINE FOOTER */
        .footer { 
            padding: 60px 20px; 
            text-align: center; 
            background: var(--navy-brand); 
            color: var(--white); 
            border-top: 5px solid var(--royal-gold);
        }

        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer-logo { font-size: 24px; font-weight: 800; }
        .footer-logo .gold { color: var(--royal-gold); }

        .footer-line { width: 50px; height: 2px; background: var(--royal-gold); margin: 20px auto; opacity: 0.5; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <span class="white">CookWith</span><span class="gold">Munavi</span>
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#recipes">Recipes</a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero">
        <img src="https://unsplash.com">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span class="main-text">Cooking Made Easy.</span>
                <span class="sub-text">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <!-- RECIPES -->
    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal" onerror="this.src='https://placehold.jp'">
                <h3>Palak Dal</h3>
            </div>
            <div class="card">
                <img src="https://unsplash.com">
                <h3>Masala Dosa</h3>
            </div>
            <div class="card">
                <img src="https://unsplash.com">
                <h3>Chicken Biryani</h3>
            </div>
        </div>
    </section>

    <!-- SINGLE-LINE FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <span style="color:#fff;">CookWith</span><span class="gold">Munavi</span>
            </div>
            <span style="color: rgba(255,255,255,0.3); font-size: 20px;">|</span>
            <p style="opacity: 0.8; font-weight: 600; letter-spacing: 1px; font-size: 14px;">
                © 2026 THE ROYAL KITCHEN STANDARD
            </p>
        </div>
        <div class="footer-line"></div>
        <p style="font-style: italic; opacity: 0.5; font-size: 13px;">Fresh • Healthy • Easy</p>
    </footer>

</body>
</html>
