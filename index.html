<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookWithMunavi</title>

<!-- FAST LOAD HERO IMAGE -->
<link rel="preload" as="image" href="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0e0e0e;
  color: #eee;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.logo .white { color: #fff; }
.logo .gold { color: #f5a623; }

.tagline {
  font-size: 11px;
  color: #bbb;
}

.nav-links a {
  margin-left: 15px;
  text-decoration: none;
  color: #ddd;
  font-size: 14px;
}

.nav-links a:hover {
  color: #f5a623;
}

/* HERO */
.hero {
  margin-top: 60px;
  position: relative;
}

/* FIX IMAGE CROPPING */
.hero img {
  width: 100%;
  height: auto;
  max-height: 90vh;
  object-fit: contain;
  background: black;
}

/* OVERLAY TEXT */
.hero-text {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90%;
}

.hero-text h1 {
  font-size: clamp(26px, 5vw, 48px);
  color: white;
  text-shadow: 0 3px 15px rgba(0,0,0,0.7);
}

.hero-text p {
  margin-top: 10px;
  color: #ddd;
  font-size: 14px;
}

/* BUTTON */
.explore-btn {
  display: inline-block;
  margin-top: 15px;
  background: #f5a623;
  color: black;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

/* SECTION */
.section {
  text-align: center;
  padding: 30px 15px;
}

.section h2 {
  color: #f5a623;
}

/* RECIPES */
.recipes {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* CARD */
.card {
  width: 90%;
  max-width: 320px;
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 12px;
  color: #f5a623;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #aaa;
}

/* DESKTOP */
@media (min-width: 768px) {
  .card { width: 220px; }
  .hero-text p { font-size: 16px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>
    <div class="logo">
      <span class="white">CookWith</span>
      <span class="gold">Munavi</span>
    </div>
    <div class="tagline">Homemade food made with love</div>
  </div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#recipes">Recipes</a>
    <a href="#">Categories</a>
    <a href="#">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png" alt="Food Banner">

  <div class="hero-text">
    <h1>Simple Recipes, Made with Love</h1>
    <p>Easy, tasty and homemade recipes for every home cook</p>
    <a href="#recipes" class="explore-btn">Explore Recipes →</a>
  </div>
</div>

<!-- RECIPES -->
<div class="section" id="recipes">
  <h2>Most Loved Recipes</h2>

  <div class="recipes">

    <div class="card" onclick="openRecipe()">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b">
      <h3>Medu Vada</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 CookWithMunavi
</div>

<script>
function openRecipe() {
  window.location.href = "recipes/dals/palak-dal.html";
}
</script>

</body>
</html>
