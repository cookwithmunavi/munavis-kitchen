<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWithMunavi | Fresh Kitchen</title>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --nav-dark: #1B2E26;      /* Dark Forest */
            --bg-lemon: #FFFDF0;      /* NEW: Sunny Creamy White (Not Grey!) */
            --section-yellow: #FFF9C4; /* Soft Lemon for separation */
            --basil-green: #2E5A2F;   /* Deep Basil for text */
            --leaf-pop: #9CCC65;      /* Vibrant Lime for buttons */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-lemon); color: var(--basil-green); }

        /* 🧼 EXPERT NAVBAR */
        .navbar {
            position: fixed; top: 0; width: 100%;
            background: var(--nav-dark);
            padding: 18px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--leaf-pop);
        }

        .logo { font-size: 24px; font-weight: 800; }
        .logo .white { color: var(--white); }
        .logo .green { color: var(--leaf-pop); }

        .nav-links a { margin-left: 30px; text-decoration: none; color: var(--white); font-weight: 700; transition: 0.3s; }
        .nav-links a:hover { color: var(--leaf-pop); }

        /* 🥗 HERO SECTION */
        .hero { 
            margin-top: 65px; height: 75vh; display: flex; align-items: center; justify-content: center; 
            background: var(--nav-dark); position: relative; overflow: hidden;
        }

        .hero img { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }

        .glass-panel {
            position: relative; z-index: 3;
            background: rgba(255, 255, 255, 0.96);
            padding: 60px; border-radius: 40px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 80%;
        }

        .explore-btn {
            background: var(--leaf-pop);
            color: var(--nav-dark);
            padding: 18px 45px; border-radius: 50px;
            text-decoration: none; font-weight: 800; display: inline-block;
            margin-top: 30px; transition: 0.4s;
        }
        .explore-btn:hover { transform: scale(1.05); background: var(--white); color: var(--basil-green); }

        /* 🖼️ RECIPE CARDS */
        .section { padding: 100px 20px; text-align: center; background: var(--section-yellow); }
        .section h2 { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 60px; color: var(--basil-green); }

        .recipes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }

        .card {
            background: var(--white); border-radius: 30px; overflow: hidden;
            transition: 0.5s ease; box-shadow: 0 15px 35px rgba(46, 90, 47, 0.1);
            cursor: pointer; border: 1px solid rgba(46, 90, 47, 0.05);
        }

        .card:hover { transform: translateY(-15px); box-shadow: 0 30px 60px rgba(46, 90, 47, 0.2); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card h3 { padding: 30px; font-weight: 800; font-size: 24px; color: var(--basil-green); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><span class="white">CookWith</span><span class="green">Munavi</span></div>
        <div class="nav-links"><a href="#">Home</a><a href="#recipes">Recipes</a></div>
    </nav>

    <header class="hero">
        <img src="https://unsplash.com" alt="Hero">
        <div class="glass-panel">
            <h1 class="hero-title">
                <span style="font-size: 3rem; display: block; font-weight: 800;">Cooking Made Easy.</span>
                <span style="font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: var(--basil-green);">Flavor in Every Step.</span>
            </h1>
            <a href="#recipes" class="explore-btn">Start Cooking Today →</a>
        </div>
    </header>

    <section class="section" id="recipes">
        <h2>Most Loved Recipes</h2>
        <div class="recipes-grid">
            <div class="card" onclick="window.location.href='recipes/dals/palak-dal.html';">
                <img src="images/palak-dal.jpeg" alt="Palak Dal">
                <h3>Palak Dal</h3>
            </div>
            <div class="card"><img src="https://unsplash.com"><h3>Masala Dosa</h3></div>
            <div class="card"><img src="https://unsplash.com"><h3>Chicken Biryani</h3></div>
        </div>
    </section>

</body>
</html>
