<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookWithMunavi</title>

<link rel="preload" as="image" href="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

/* 🌿 BASE */
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1a1410, #120d0a);
  color: #f5f5f5;
  overflow-x: hidden;
}

/* 🔥 NAVBAR (GLASS EFFECT) */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(28,21,17,0.8);
  backdrop-filter: blur(10px);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  border-bottom: 1px solid rgba(245,166,35,0.2);
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.logo .white { color: #fff; }
.logo .gold { color: #f5a623; }

.nav-links a {
  margin-left: 15px;
  text-decoration: none;
  color: #c7b8a3;
  font-size: 14px;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #f5a623;
}

/* HERO */
.hero {
  margin-top: 60px;
  position: relative;
}

.hero img {
  width: 100%;
  max-height: 90vh;
  object-fit: cover;
}

/* BUTTON */
.hero-btn {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.explore-btn {
  background: linear-gradient(135deg, #f5a623, #ffcc80);
  color: #2a1a0f;
  padding: 14px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s;
  box-shadow: 0 4px 20px rgba(245,166,35,0.3);
}

.explore-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 8px 30px rgba(245,166,35,0.6);
}

.explore-btn:active {
  transform: scale(0.96);
}

/* SECTION */
.section {
  text-align: center;
  padding: 50px 15px;
  background: #221a15;
}

.section h2 {
  color: #f5a623;
  font-size: 28px;
  position: relative;
  margin-bottom: 30px;
}

.section h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 3px;
  background: #f5a623;
  margin: 10px auto;
}

/* RECIPES */
.recipes {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* 💎 CARD (GLASS + ANIMATION) */
.card {
  width: 90%;
  max-width: 320px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.4s;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(40px);
}

/* SCROLL ANIMATION ACTIVE */
.card.show {
  opacity: 1;
  transform: translateY(0);
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 12px 40px rgba(245,166,35,0.2);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* TITLE */
.card h3 {
  margin: 12px;
  color: #ffcc80;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: #c7b8a3;
  background: #1c1511;
}

/* DESKTOP */
@media (min-width: 768px) {
  .card { width: 220px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <span class="white">CookWith</span>
    <span class="gold">Munavi</span>
  </div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#recipes">Recipes</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="images/Gemini_Generated_Image_qz5qiqz5qiqz5qiq.png">

  <div class="hero-btn">
    <a href="#recipes" class="explore-btn">Explore Recipes →</a>
  </div>
</div>

<!-- RECIPES -->
<div class="section" id="recipes">
  <h2>Most Loved Recipes</h2>

  <div class="recipes">

    <div class="card" onclick="openRecipe()">
      <img src="images/palak-dal.jpeg">
      <h3>Palak Dal</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078056-fc7b96f1d2">
      <h3>Masala Dosa</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1603894584373-5ac82b2ae398">
      <h3>Chicken Biryani</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908177453-7462950a6a3b">
      <h3>Medu Vada</h3>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 CookWithMunavi
</div>

<script>
function openRecipe() {
  window.location.href = "recipes/dals/palak-dal.html";
}

/* 🎬 SCROLL ANIMATION */
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.2 });

cards.forEach(card => observer.observe(card));
</script>

</body>
</html>
