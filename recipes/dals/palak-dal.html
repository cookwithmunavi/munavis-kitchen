<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>cookwithMunavi - Palak Dal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --terracotta: #A0522D;
            --deep-forest: #1B5E20;
            --pure-white: #FFFFFF;
            --text-dark: #2D2D2D;
            --warm-bg: #FCFBFA;
            --lite-green-bg: #F1F8E9;
            --slate-blue: #455A64;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--pure-white); 
            color: var(--text-dark); 
            line-height: 1.6; 
        }

        /* Navbar & Logo Styling */
        .navbar {
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--terracotta); 
            text-decoration: none;
            display: flex;
            align-items: baseline;
            letter-spacing: -0.5px;
        }

        .brand-suffix { 
            color: var(--deep-forest); 
            display: inline-flex;
            align-items: baseline;
        }

        /* Leaf Wrapper for the "i" */
        .i-wrapper {
            position: relative;
            display: inline-block;
            line-height: 1;
        }

        .leaf-icon {
            position: absolute;
            top: -14px; /* Adjust based on font size */
            left: 50%;
            transform: translateX(-40%);
            width: 18px; /* Proportional to navbar font size */
            height: 18px;
            fill: var(--deep-forest);
        }

        .home-link { 
            text-decoration: none; 
            color: var(--terracotta); 
            font-weight: 800; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            border: 1.5px solid var(--terracotta); 
            padding: 5px 15px; 
            border-radius: 8px; 
            transition: 0.3s; 
        }

        .home-link:hover { 
            background: var(--terracotta); 
            color: white; 
        }

        /* Hero Section */
        .hero-recipe {        
            padding: 120px 6% 140px;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.3)), 
                        url('../../images/IMG_20260503_204921~2.png'); 
            background-size: cover; 
            background-position: center top; 
            text-align: center; 
            color: white; 
            min-height: 450px;
        }

        .hero-recipe h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 8vw, 3.5rem); 
            margin-bottom: 15px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .meta-container { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap;
        }

        .meta-tag { 
            background: rgba(0,0,0,0.4); 
            padding: 5px 15px; 
            border-radius: 50px; 
            font-size: 0.65rem; 
            font-weight: 800; 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3); 
        }

        /* Content Layout */
        .unified-section { 
            max-width: 1100px; 
            margin: -50px auto 40px; 
            padding: 0 4%; 
            position: relative; 
            z-index: 10;
        }

        .master-board { 
            background: white; 
            border-radius: 30px; 
            padding: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); 
            border: 1px solid #f0f0f0;
        }

        .board-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px;
        }

        .col-title { 
            font-weight: 800; 
            font-size: 0.75rem; 
            color: var(--terracotta); 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-left: 4px solid var(--terracotta); 
            padding-left: 10px; 
        }

        .ing-list { list-style: none; }
        .ing-list li { 
            padding: 12px 0; 
            border-bottom: 1px solid #f9f9f9; 
            font-size: 0.85rem; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
        }

        .qty { font-weight: 800; color: var(--deep-forest); }

        .engine-frame { 
            background: var(--warm-bg); 
            border-radius: 35px; 
            padding: 20px; 
            border: 1px solid #f0e6d2; 
            margin-top: 20px;
        }

        #cooking-progress { 
            width: 0%; 
            height: 100%; 
            background: var(--deep-forest); 
            transition: 0.5s ease; 
        }

        .task-card { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            border-left: 6px solid var(--terracotta); 
            transition: 0.3s;
        }

        .task-card.active-task { 
            border-left-color: var(--deep-forest); 
            background: #fdfaf5; 
            transform: scale(1.01);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .hero-recipe { padding: 60px 4% 80px; }
            .logo { font-size: 1.4rem; }
            .leaf-icon { width: 14px; height: 14px; top: -10px; }
        }
    </style>
</head>
