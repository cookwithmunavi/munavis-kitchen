<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palak Dal - cookwithMunavi</title>
    
    <!-- External Resources -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bright-orange': '#FF9800',
                        'lime-green': '#68A306',
                        'warm-bg': '#FAF9F2',
                        'text-dark': '#333333',
                        'text-muted': '#555555',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: white; color: #333333; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        
        .scroll-top { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            width: 45px; 
            height: 45px; 
            background: #68A306; 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-decoration: none; 
            font-size: 20px; 
            z-index: 1000; 
            box-shadow: 0 5px 15px rgba(104, 163, 6, 0.2); 
            border: none; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }
        .scroll-top.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .scroll-top:hover { 
            transform: scale(1.1) translateY(-5px); 
            background: #FF9800; 
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const RECIPE_DATA = {
            title: "Palak Dal",
            ingredients: [
                { category: "Cooker Items", items: [
                    { name: "Toor Dal", qty: "0.5 Cup" },
                    { name: "Palak", qty: "2 Cups" },
                    { name: "Tomatoes", qty: "2 Medium" },
                    { name: "Green Chilies", qty: "2 Nos" },
                    { name: "Tamarind", qty: "Small Piece" },
                    { name: "Turmeric powder", qty: "0.5 tbsp" },
                    { name: "Salt", qty: "0.5 tbsp" },
                    { name: "Water", qty: "3 Cups" }
                ]},
                { category: "Tadka Spices", items: [
                    { name: "Oil / Ghee", qty: "2 tbsp" },
                    { name: "Onion", qty: "1 Small" },
                    { name: "Garlic", qty: "4 Cloves" },
                    { name: "Dry Red Chilies", qty: "2 Nos" },
                    { name: "Mustard Seeds", qty: "1 tbsp" },
                    { name: "Cumin Seeds", qty: "1 tbsp" },
                    { name: "Curry Leaves", qty: "1 Handful" }
                ]},
                { category: "Pre-Check", items: [
                    { name: "Dal Rinsed?", qty: "3 Times" },
                    { name: "Palak Clean?", qty: "3 Times" },
                    { name: "Palak Chopped", qty: "Yes" },
                    { name: "Cooker Ready?", qty: "Ready" },
                    { name: "Garlic Peeled?", qty: "Yes" },
                    { name: "Onions Chopped?", qty: "Yes" }
                ]},
                { category: "Garnish", items: [
                    { name: "Coriander Leaves Chopped", qty: "1 Handful" }
                ]}
            ],
            steps: [
                {
                    id: 1,
                    label: "PREP & COOK",
                    tasks: [
                        { id: "t1", name: "Meticulous Prep", timeLabel: "5 MINS", timeSeconds: 300, details: ["Rinse toor dal 3 times until clear.", "Wash palak twice to remove hidden grit.", "Slit green chilies and chop tomatoes."] },
                        { id: "t2", name: "Pressure Cooking", timeLabel: "15 MINS", timeSeconds: 900, details: ["Combine dal, palak, tomatoes, and tamarind in cooker.", "Add 3 cups water. **No salt yet.**", "Cook for 4 whistles on medium-high heat."] }
                    ]
                },
                {
                    id: 2,
                    label: "THE TADKA",
                    tasks: [
                        { id: "t3", name: "Golden Tempering", timeLabel: "5 MINS", timeSeconds: 300, details: ["Heat ghee/oil and crackle mustard/cumin seeds.", "Add garlic and red dry chillies; sauté until golden brown.", "Add onions and curry leaves; sauté until soft."] }
                    ]
                },
                {
                    id: 3,
                    label: "FINISHING",
                    tasks: [
                        { id: "t4", name: "Mash & Mix", timeLabel: "3 MINS", timeSeconds: 180, details: ["Release pressure naturally and open cooker.", "**Add Salt now.** Whisk dal until smooth.", "Pour hot Tadka directly into the dal."] },
                        { id: "t5", name: "The Infusion", timeLabel: "2 MINS", timeSeconds: 120, details: ["Toss in freshly chopped coriander leaves.", "Cover immediately for 2 minutes to lock aroma."] }
                    ]
                }
            ]
        };

        const Logo = ({ className = "" }) => (
            <a href="#" className={`font-display text-[1.6rem] font-black text-lime-green tracking-tight flex items-baseline no-underline ${className}`}>
                cookwith
                <span className="text-bright-orange flex items-baseline ml-0.5 italic">
                    Munavi
                </span>
            </a>
        );

        function App() {
            const [activeStep, setActiveStep] = useState(1);
            const [completedTasks, setCompletedTasks] = useState(new Set());
            const [checkedIngredients, setCheckedIngredients] = useState(new Set());
            const [activeTaskId, setActiveTaskId] = useState(null);
            const [activeTaskName, setActiveTaskName] = useState("");
            const [timeLeft, setTimeLeft] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [showScrollTop, setShowScrollTop] = useState(false);
            const timerRef = useRef(null);

            useEffect(() => {
                const handleScroll = () => setShowScrollTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (isTimerRunning && timeLeft > 0) {
                    timerRef.current = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && isTimerRunning) {
                    setIsTimerRunning(false);
                    if (activeTaskId) {
                        setCompletedTasks(prev => {
                            const next = new Set(prev);
                            next.add(activeTaskId);
                            return next;
                        });
                        setActiveTaskId(null);
                        setActiveTaskName("");
                    }
                }
                return () => clearInterval(timerRef.current);
            }, [isTimerRunning, timeLeft, activeTaskId]);

            const handleTaskClick = (task) => {
                setCompletedTasks(prev => {
                    const next = new Set(prev);
                    next.add(task.id);
                    return next;
                });
                setActiveTaskId(task.id);
                setActiveTaskName(task.name);
                setTimeLeft(task.timeSeconds);
                setIsTimerRunning(true);
            };

            // UPDATED: Controlled slow scroll to top
            const scrollToTop = () => {
                const scrollDuration = 800; // Duration in milliseconds
                const scrollStep = -window.scrollY / (scrollDuration / 15);
                
                const scrollInterval = setInterval(() => {
                    if (window.scrollY !== 0) {
                        window.scrollBy(0, scrollStep);
                    } else {
                        clearInterval(scrollInterval);
                    }
                }, 15);
            };

            const toggleIngredient = (name) => {
                setCheckedIngredients(prev => {
                    const next = new Set(prev);
                    if (next.has(name)) next.delete(name);
                    else next.add(name);
                    return next;
                });
            };

            const currentStepData = RECIPE_DATA.steps.find(s => s.id === activeStep);
            const totalTasks = RECIPE_DATA.steps.reduce((acc, s) => acc + s.tasks.length, 0);
            const progressPercent = Math.round((completedTasks.size / totalTasks) * 100);

            return (
                <div className="min-h-screen bg-white font-sans text-slate-800">
                    <nav className="border-b border-slate-100 px-[6%] py-4 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-50">
                        <div className="flex items-center">
                            <Logo />
                        </div>
                        <a href="../../index.html" className="bg-bright-orange text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:scale-105 active:scale-95 shadow-lg shadow-bright-orange/20 transition-all no-underline">HOME</a>
                    </nav>

                    <div className="h-64 md:h-80 bg-cover bg-center flex items-center justify-center relative overflow-hidden" 
                         style={{ backgroundImage: `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.3)), url('../../images/palak_dal_page_hero.png')` }}>
                        <div className="text-center">
                            <h1 className="font-display text-5xl md:text-7xl text-white font-black drop-shadow-[0_5px_15px_rgba(0,0,0,0.5)]">Palak Dal</h1>
                            <div className="flex justify-center gap-2 mt-4">
                                <span className="bg-white/30 backdrop-blur-md border border-white/40 px-4 py-1.5 rounded-full text-white text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-sm">🕒 30 Mins</span>
                                <span className="bg-white/30 backdrop-blur-md border border-white/40 px-4 py-1.5 rounded-full text-white text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-sm">⭐ Beginner Safe</span>
                                <span className="bg-white/30 backdrop-blur-md border border-white/40 px-4 py-1.5 rounded-full text-white text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-sm">🥗 Step-By-Step</span>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-[1200px] mx-auto px-4 md:px-8 -mt-16 pb-20 relative z-10">
                        
                        <section className="bg-white rounded-[2rem] border border-slate-100 shadow-2xl p-8 md:p-12 mb-10 overflow-hidden">
                            <h2 className="text-base md:text-lg font-black text-lime-green uppercase tracking-[0.4em] mb-12 text-center py-4 bg-lime-green/5 rounded-2xl border border-lime-green/10 max-w-md mx-auto">
                                Pantry Essentials
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10">
                                {RECIPE_DATA.ingredients.map((group, idx) => (
                                    <div key={idx}>
                                        <h3 className="text-[10px] font-black text-bright-orange uppercase tracking-[0.2em] mb-6 border-l-4 border-bright-orange pl-4 leading-none">{group.category}</h3>
                                        <ul className="space-y-3">
                                            {group.items.map((item, i) => (
                                                <li 
                                                    key={i} 
                                                    onClick={() => toggleIngredient(item.name)}
                                                    className="flex items-start gap-3 text-sm border-b border-slate-50 pb-2 cursor-pointer group"
                                                >
                                                    <div className={`mt-0.5 w-4 h-4 rounded border-2 flex items-center justify-center transition-all ${checkedIngredients.has(item.name) ? 'bg-lime-green border-lime-green' : 'border-slate-200 group-hover:border-lime-green/50'}`}>
                                                        {checkedIngredients.has(item.name) && <span className="text-white text-[10px] font-bold">✓</span>}
                                                    </div>
                                                    <div className="flex-1 flex justify-between items-center">
                                                        <span className={`font-bold transition-all ${checkedIngredients.has(item.name) ? 'text-slate-300 line-through' : 'text-slate-700'}`}>{item.name}</span>
                                                        <span className={`font-black transition-all ${checkedIngredients.has(item.name) ? 'text-slate-300 line-through' : 'text-lime-green'}`}>{item.qty}</span>
                                                    </div>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="bg-white rounded-[2rem] border border-slate-100 shadow-2xl p-8 md:p-12 mb-10">
                            <h2 className="text-base md:text-lg font-black text-bright-orange uppercase tracking-[0.4em] mb-8 text-center py-4 bg-bright-orange/5 rounded-2xl border border-bright-orange/10 max-w-md mx-auto">
                                Cooking Process
                            </h2>

                            <div className="mb-10 px-1">
                                <div className="flex justify-between text-[11px] font-black text-lime-green uppercase tracking-widest mb-3">
                                    <span>Recipe Completion</span>
                                    <span className="text-bright-orange">{progressPercent}%</span>
                                </div>
                                <div className="h-2 bg-slate-200 rounded-full overflow-hidden">
                                    <div style={{ width: `${progressPercent}%` }} className="h-full bg-lime-green transition-all duration-1000"></div>
                                </div>
                            </div>

                            <div className="flex flex-wrap gap-2 mb-8 justify-center">
                                {RECIPE_DATA.steps.map(step => {
                                    const isDone = step.tasks.every(t => completedTasks.has(t.id));
                                    const isActive = activeStep === step.id;
                                    return (
                                        <button 
                                            key={step.id} 
                                            onClick={() => setActiveStep(step.id)}
                                            className={`px-6 py-3 rounded-full text-[9px] font-black uppercase tracking-widest transition-all border-2 ${isActive ? 'bg-bright-orange border-bright-orange text-white shadow-lg' : isDone ? 'bg-lime-green border-lime-green text-white' : 'bg-white border-slate-100 text-slate-400'}`}
                                        >
                                            0{step.id}. {step.label}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="bg-white rounded-[1.5rem] py-6 px-6 border-2 border-lime-green text-center mb-10 shadow-sm max-w-md mx-auto">
                                <span className="text-5xl font-black text-lime-green tabular-nums tracking-tighter leading-none block">
                                    {Math.floor(timeLeft / 60)}:{String(timeLeft % 60).padStart(2, '0')}
                                </span>
                                <p className="text-[8px] font-black text-bright-orange uppercase tracking-[0.3em] mt-2">
                                    {activeTaskId ? `${activeTaskName} RUNNING...` : 'Tap a task to start timer'}
                                </p>
                                {activeTaskId && (
                                    <div className="flex justify-center gap-3 mt-4">
                                        <button 
                                            onClick={() => setIsTimerRunning(!isTimerRunning)}
                                            className="bg-lime-green text-white px-5 py-2 rounded-lg font-black text-[8px] uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all outline-none"
                                        >
                                            {isTimerRunning ? "Pause" : "Resume"}
                                        </button>
                                    </div>
                                )}
                            </div>

                            <AnimatePresence mode="wait">
                                <motion.div 
                                    key={activeStep}
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -20 }}
                                    transition={{ duration: 0.4, ease: "easeOut" }}
                                    className="space-y-4 mb-8"
                                >
                                    {currentStepData.tasks.map(task => {
                                        const isDone = completedTasks.has(task.id);
                                        const isActive = activeTaskId === task.id;
                                        return (
                                            <div 
                                                key={task.id} 
                                                onClick={() => handleTaskClick(task)}
                                                className={`p-6 md:p-8 rounded-[2rem] border-l-[8px] transition-all cursor-pointer shadow-sm ${isDone ? 'bg-[#F1F8E9] border-lime-green' : isActive ? 'bg-white border-lime-green scale-[1.01] shadow-xl' : 'bg-white border-bright-orange hover:border-lime-green/20'}`}
                                            >
                                                <div className="flex justify-between items-center mb-4">
                                                    <h4 className={`text-lg font-black tracking-tight ${isDone ? 'text-slate-400' : 'text-slate-800'}`}>{task.name}</h4>
                                                    <span className="text-[9px] font-black text-lime-green uppercase bg-lime-green/5 px-3 py-1 rounded-full">{isDone ? "Done" : task.timeLabel}</span>
                                                </div>
                                                <ul className="space-y-2">
                                                    {task.details.map((detail, idx) => (
                                                        <li key={idx} className={`text-[14px] flex gap-3 font-bold transition-all ${isDone ? 'text-slate-300' : 'text-slate-700'}`}>
                                                            <span className="text-bright-orange">•</span>
                                                            <span>{detail}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        );
                                    })}
                                </motion.div>
                            </AnimatePresence>

                            <div className="flex justify-between items-center pt-6 border-t border-slate-100">
                                <div>
                                    {activeStep > 1 && (
                                        <button 
                                            onClick={() => { setActiveStep(activeStep - 1); }}
                                            className="min-w-[120px] bg-slate-100 border border-slate-300 text-slate-700 px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-slate-200 transition-all outline-none active:scale-95"
                                        >
                                            ← BACK
                                        </button>
                                    )}
                                </div>
                                
                                <div>
                                    {activeStep < RECIPE_DATA.steps.length ? (
                                        <button 
                                            onClick={() => { setActiveStep(activeStep + 1); }}
                                            className="min-w-[140px] bg-bright-orange text-white px-8 py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] shadow-xl shadow-bright-orange/20 hover:scale-105 active:scale-95 transition-all outline-none"
                                        >
                                            NEXT STEP →
                                        </button>
                                    ) : (
                                        <div className="flex items-center gap-2 text-lime-green font-black text-[10px] uppercase tracking-widest bg-lime-green/10 px-6 py-3 rounded-xl border border-lime-green/20">
                                            ✨ RECIPE READY
                                        </div>
                                    )}
                                </div>
                            </div>
                        </section>

                        <div className="bg-[#FAF9F2] p-8 rounded-[2rem] border-2 border-dashed border-lime-green/20 relative overflow-hidden shadow-inner">
                            <div className="relative z-10">
                                <h4 className="font-display text-xl font-black text-lime-green mb-6 flex items-center gap-3">
                                    <svg className="w-6 h-6 text-bright-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
                                    </svg>
                                    CHEF'S SECRETS
                                </h4>
                                <ul className="space-y-4">
                                    <li className="text-[13px] text-slate-800 font-bold flex gap-4">
                                        <span className="text-bright-orange">•</span>
                                        Salt prevents dal from softening—always add it at the very end after whistling.
                                    </li>
                                    <li className="text-[13px] text-slate-800 font-bold flex gap-4">
                                        <span className="text-bright-orange">•</span>
                                        Sautéing garlic until nutty golden is the key to that smoky aroma.
                                    </li>
                                    <li className="text-[13px] text-slate-800 font-bold flex gap-4">
                                        <span className="text-bright-orange">•</span>
                                        Covering the dal immediately after adding tadka locks in the deep flavor.
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <footer className="mt-20 text-center">
                            <div className="flex items-center justify-center mb-6">
                                <Logo />
                            </div>
                            <p className="text-[11px] font-black text-slate-300 uppercase tracking-[0.5em] font-semibold">© 2026 The Modern Kitchen | Built for Bold Beginners</p>
                        </footer>

                        <button 
                            onClick={scrollToTop}
                            className={`scroll-top ${showScrollTop ? 'visible' : ''}`}
                        >
                            ↑
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
